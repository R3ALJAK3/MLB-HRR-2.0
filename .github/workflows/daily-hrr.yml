name: MLB HRR Daily Update

on:
  schedule:
    # 10:00 AM ET = 14:00 UTC (adjusts automatically for DST)
    - cron: "0 09 * * *"
    - cron: "0 11 * * *"
    - cron: "0 13 * * *"
    - cron: "0 15 * * *"
    - cron: "0 17 * * *"
    - cron: "0 19 * * *"

  # Allow manual trigger from GitHub UI
  workflow_dispatch:

jobs:
  generate-hrr:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install dependencies
        run: rm -rf node_modules && npm install
        working-directory: scripts

      - name: Generate HRR data
        run: node generate-hrr.js
        working-directory: scripts
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GIST_ID: ${{ secrets.GIST_ID }}
          GITHUB_TOKEN: ${{ secrets.GIST_TOKEN }}

      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::HRR generation failed. Check logs above."
          echo "::warning::Dashboard will show yesterday's data until next run."
