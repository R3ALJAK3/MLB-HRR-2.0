name: MLB HRR Daily Update

on:
  schedule:
    - cron: "0 13 * * *"
    - cron: "0 15 * * *"
    - cron: "0 16 * * *"
    - cron: "0 17 * * *"
    - cron: "0 19 * * *"
    - cron: "0 21 * * *"
    - cron: "0 23 * * *"

  workflow_dispatch:

jobs:
  generate-hrr:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm install

      - name: Generate HRR data
        run: node scripts/generate-hrr.js
        env:
          GIST_ID: ${{ secrets.GIST_ID }}
          GIST_ID_HISTORY: ${{ secrets.GIST_ID_HISTORY }}
          GITHUB_TOKEN: ${{ secrets.GIST_TOKEN }}
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}

      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::HRR generation failed. Check logs above."
          echo "::warning::Dashboard will show yesterday's data until next run."
