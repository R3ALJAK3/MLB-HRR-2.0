name: MLB HRR Daily Update

on:
  schedule:
    # All times UTC — ET = UTC-4 (EDT) or UTC-5 (EST)
    - cron: "0 13 * * *"   # 9:00 AM ET
    - cron: "0 15 * * *"   # 11:00 AM ET
    - cron: "0 17 * * *"   # 1:00 PM ET
    - cron: "0 19 * * *"   # 3:00 PM ET
    - cron: "0 21 * * *"   # 5:00 PM ET
    - cron: "0 23 * * *"   # 7:00 PM ET

  # Allow manual trigger from GitHub Actions UI
  workflow_dispatch:

jobs:
  generate-hrr:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: rm -rf node_modules && npm install
        working-directory: scripts

      - name: Generate HRR data
        run: node generate-hrr.js
        working-directory: scripts
        env:
          GIST_ID: ${{ secrets.GIST_ID }}
          GITHUB_TOKEN: ${{ secrets.GIST_TOKEN }}
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}

      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::HRR generation failed. Check logs above."
          echo "::warning::Dashboard will show yesterday's data until next run."
