<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>MLB HRR Dashboard</title>
<link rel="manifest" href="data:application/json,%7B%22name%22%3A%22MLB%20HRR%22%2C%22short_name%22%3A%22HRR%22%2C%22start_url%22%3A%22.%22%2C%22display%22%3A%22standalone%22%2C%22background_color%22%3A%22%2308080a%22%2C%22theme_color%22%3A%22%2310b981%22%7D">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#08080a">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#08080a;--bg2:#1a1a1f;--bg3:#222228;--bg4:#2a2a32;
  --border:rgba(255,255,255,.05);--border2:rgba(255,255,255,.10);
  --text:#e4e4e7;--muted:#71717a;--dim:#3f3f46;
  --green:#10b981;--gbg:rgba(16,185,129,.12);--gdim:rgba(16,185,129,.05);
  --amber:#f59e0b;--abg:rgba(245,158,11,.12);
  --blue:#60a5fa;--bbg:rgba(96,165,250,.1);
  --red:#ef4444;--rbg:rgba(239,68,68,.1);
  --purple:#a78bfa;--pbg:rgba(167,139,250,.1);
  --mono:'SF Mono','Fira Code','Cascadia Code',monospace;
  --r:8px;--rl:10px;
}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@keyframes scaleIn{from{opacity:0;transform:scale(.97)}to{opacity:1;transform:scale(1)}}
html,body{height:100%;overflow-x:hidden}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,sans-serif;font-size:14px;line-height:1.5}

.header{background:rgba(8,8,10,.85);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:.7rem 1rem;display:flex;align-items:center;justify-content:space-between;gap:.5rem;position:sticky;top:0;z-index:100}
.logo{font-size:15px;font-weight:700;display:flex;align-items:center;gap:7px}
.dot{width:7px;height:7px;border-radius:50%;background:var(--green);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.hright{display:flex;align-items:center;gap:6px}
.badge{font-size:10px;font-weight:600;padding:2px 7px;border-radius:4px;font-family:var(--mono)}
.bl{background:var(--gbg);color:var(--green)}
.bs{background:var(--abg);color:var(--amber)}
.bload{background:var(--bbg);color:var(--blue)}
.hsub{font-size:11px;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:180px}
.btn{background:var(--bg3);border:1px solid var(--border2);border-radius:6px;padding:5px 10px;font-size:12px;color:var(--muted);cursor:pointer}
.btn:active{opacity:.7}
.btn-sm{padding:4px 8px;font-size:11px}

.tabs{background:var(--bg2);border-bottom:1px solid var(--border);display:flex;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;padding:0 .75rem}
.tabs::-webkit-scrollbar{display:none}
.tab{background:none;border:none;border-bottom:2px solid transparent;padding:9px 12px;font-size:13px;font-weight:500;color:var(--muted);cursor:pointer;white-space:nowrap;margin-bottom:-1px;flex-shrink:0}
.tab.on{color:var(--text);border-bottom-color:var(--blue)}
.tbadge{font-size:10px;background:var(--bg3);padding:1px 5px;border-radius:3px;margin-left:3px;font-family:var(--mono)}

.main{padding:1rem;max-width:1400px;margin:0 auto}
.panel{display:none}.panel.on{display:block}

/* stat cards */
.sg{display:grid;grid-template-columns:repeat(auto-fit,minmax(90px,1fr));gap:6px;margin-bottom:1rem}
.sc{background:var(--bg2);border:1px solid rgba(255,255,255,.06);border-radius:var(--r);padding:.75rem}
.sc .l{font-size:10px;color:var(--muted);margin-bottom:3px;text-transform:uppercase;letter-spacing:.4px}
.sc .v{font-size:20px;font-weight:700;font-family:var(--mono)}

/* tables */
.tw{background:var(--bg2);border:1px solid rgba(255,255,255,.06);border-radius:var(--rl);overflow-x:auto;-webkit-overflow-scrolling:touch}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;padding:7px 8px;font-size:10px;font-weight:600;color:var(--muted);border-bottom:1px solid var(--border);cursor:pointer;user-select:none;white-space:nowrap;text-transform:uppercase;letter-spacing:.3px}
th:hover{color:var(--text)}
th[data-tip]{cursor:help;border-bottom:1px dashed var(--dim)}

/* global tooltip */
#gtip{position:fixed;background:var(--bg4);color:var(--text);font-size:12px;font-weight:400;padding:7px 11px;border-radius:6px;border:1px solid var(--border2);white-space:normal;max-width:240px;z-index:9999;line-height:1.4;pointer-events:none;box-shadow:0 4px 16px rgba(0,0,0,.5);display:none;text-transform:none;letter-spacing:0}
td{padding:5px 8px;border-bottom:1px solid var(--border);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(255,255,255,.02)}
.n{font-family:var(--mono)}
.ta{background:var(--gbg);color:var(--green);font-size:10px;font-weight:600;padding:2px 6px;border-radius:4px;font-family:var(--mono)}
.tb2{background:var(--abg);color:var(--amber);font-size:10px;font-weight:600;padding:2px 6px;border-radius:4px;font-family:var(--mono)}
.tc{color:var(--dim);font-size:11px}
.chip{font-size:10px;font-weight:600;padding:2px 6px;border-radius:3px;background:var(--bg3);color:var(--muted)}
.htag{font-size:9px;background:var(--rbg);color:var(--red);padding:1px 4px;border-radius:3px;margin-left:3px;font-family:var(--mono);font-weight:700}
.k10{font-size:9px;background:var(--bbg);color:var(--blue);padding:1px 4px;border-radius:3px;margin-left:3px;font-family:var(--mono);font-weight:700}
.hand-r{font-size:9px;background:var(--pbg);color:var(--purple);padding:1px 4px;border-radius:3px;font-family:var(--mono);font-weight:700}
.hand-l{font-size:9px;background:var(--bbg);color:var(--blue);padding:1px 4px;border-radius:3px;font-family:var(--mono);font-weight:700}

/* top plays cards */
.tp-card{background:var(--bg2);border:1px solid rgba(255,255,255,.06);border-radius:var(--r);padding:.75rem;margin-bottom:6px;display:flex;align-items:center;gap:.75rem}
.tp-rank{font-family:var(--mono);font-size:12px;color:var(--dim);min-width:18px;text-align:center}
.tp-info{flex:1;min-width:0}
.tp-name{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tp-meta{font-size:11px;color:var(--muted);margin-top:2px}
.tp-right{text-align:right;flex-shrink:0}
.tp-hrr{font-size:18px;font-weight:700;font-family:var(--mono)}
.tp-breakdown{font-size:10px;color:var(--muted);margin-top:1px;font-family:var(--mono)}

/* game cards */
.gc{background:var(--bg2);border:1px solid rgba(255,255,255,.06);border-radius:var(--rl);padding:1rem;margin-bottom:.75rem}
.gc.live{border-color:rgba(34,197,94,.3)}
.ghdr{display:flex;justify-content:space-between;align-items:flex-start;gap:.5rem;margin-bottom:.9rem;flex-wrap:wrap}
.gtitle{font-size:15px;font-weight:700}
.gmeta{font-size:11px;color:var(--muted);margin-top:2px}
.gscore{font-size:20px;font-weight:700;font-family:var(--mono);color:var(--green)}
.gstatus{font-size:11px;padding:2px 7px;border-radius:4px;font-weight:600;display:inline-block;margin-top:2px}
.sl{background:var(--gbg);color:var(--green)}
.sf{background:var(--bg3);color:var(--muted)}
.sp2{background:var(--bbg);color:var(--blue)}
.gg{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
.tlbl{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);padding-bottom:4px;border-bottom:1px solid var(--border);margin-bottom:7px}
.pi{font-size:11px;color:var(--muted);margin-bottom:7px;line-height:1.5}
.pi strong{color:var(--text);font-weight:500}

/* lineup rows in game slate */
.lr{display:grid;grid-template-columns:14px 1fr 22px 38px 38px 38px 42px;gap:3px;align-items:center;padding:3px 4px;border-radius:4px;font-size:12px}
.lr.a{background:var(--gdim)}
.lr.b{background:rgba(245,158,11,.06)}
.lnum{font-family:var(--mono);font-size:10px;color:var(--dim)}
.lname{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.lname.a{color:var(--green);font-weight:600}
.lname.b{color:var(--amber)}
.lpos{font-size:10px;color:var(--dim);text-align:center}
.lsub{font-family:var(--mono);font-size:11px;text-align:right}
.lsub.a{color:var(--green);font-weight:600}
.lsub.b{color:var(--amber)}
.lhdr{display:grid;grid-template-columns:14px 1fr 22px 38px 38px 38px 42px;gap:3px;padding:2px 4px;font-size:9px;color:var(--dim);font-family:var(--mono);text-transform:uppercase;margin-bottom:2px}
.wx{font-size:10px;background:var(--abg);color:var(--amber);padding:1px 5px;border-radius:3px;font-weight:600}

/* filter bar */
.fbar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:.75rem;align-items:center}
.fbar select,.fbar input{background:var(--bg2);border:1px solid var(--border2);border-radius:6px;padding:5px 8px;color:var(--text);font-size:12px;outline:none}
.fbar select:focus,.fbar input:focus{border-color:var(--blue)}
.fbar label{font-size:11px;color:var(--muted)}

/* stack cards */
.scard{background:var(--bg2);border:1px solid rgba(255,255,255,.06);border-radius:var(--r);padding:.75rem 1rem;margin-bottom:6px;display:flex;align-items:center;gap:.75rem;flex-wrap:wrap}
.srank{font-family:var(--mono);font-size:12px;color:var(--dim);min-width:18px}
.splayers{flex:1;display:flex;align-items:center;gap:5px;flex-wrap:wrap;font-size:12px}
.stot{font-family:var(--mono);font-size:16px;font-weight:700;color:var(--green);margin-left:auto}

/* live / results */
.res-win td{background:rgba(34,197,94,.04)}
.gg2{color:var(--green);font-weight:600}
.gb2{color:var(--red)}
.none-state{text-align:center;padding:2.5rem 1rem}
.none-state .icon{font-size:32px;margin-bottom:.75rem;opacity:.4}
.none-state .msg{font-size:14px;color:var(--muted)}

/* live boxscore expand */
.live-expand{cursor:pointer}
.live-expand:hover{border-color:var(--border2)}
.live-bs{margin-top:8px;border-top:1px solid var(--border);padding-top:8px}
.live-bs table{font-size:12px}
.live-bs th{font-size:9px;padding:4px 6px;text-transform:uppercase;cursor:default}
.live-bs td{padding:3px 6px;font-size:12px;font-family:var(--mono)}
.live-bs .pname{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-weight:500}
.expand-hint{font-size:10px;color:var(--dim);margin-top:4px;transition:opacity .2s}
.chevron{display:inline-block;transition:transform .2s;font-size:10px;color:var(--dim);margin-left:4px}

/* player detail popup */
#player-popup{position:fixed;top:0;left:0;width:100%;height:100%;z-index:500;display:none;align-items:flex-start;justify-content:center;padding-top:60px;background:rgba(0,0,0,.5)}
#player-popup.show{display:flex}
.pp-card{background:var(--bg2);border:1px solid var(--border2);border-radius:12px;padding:1.25rem;max-width:480px;width:95%;max-height:80vh;overflow-y:auto;position:relative}
.pp-close{position:absolute;top:10px;right:14px;background:none;border:none;color:var(--muted);font-size:18px;cursor:pointer;padding:4px}
.pp-close:hover{color:var(--text)}
.pp-name{font-size:18px;font-weight:700;margin-bottom:2px}
.pp-meta{font-size:12px;color:var(--muted);margin-bottom:12px}
.pp-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:10px}
.pp-stat{background:var(--bg3);border-radius:6px;padding:6px 8px}
.pp-stat .l{font-size:10px;color:#a1a1aa;text-transform:uppercase;letter-spacing:.4px;font-weight:600}
.pp-stat .v{font-size:15px;font-weight:600;font-family:var(--mono)}
.pp-section{font-size:10px;font-weight:600;color:var(--dim);text-transform:uppercase;letter-spacing:.5px;margin:10px 0 4px;padding-top:6px;border-top:1px solid var(--border)}
.plink{cursor:pointer;text-decoration:none}
.plink:hover{text-decoration:underline;text-decoration-color:var(--dim)}

.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:4rem 1rem;gap:1rem}
.spinner{width:26px;height:26px;border:2px solid var(--border2);border-top-color:var(--blue);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.ltxt{font-size:13px;color:var(--muted)}
.ebox{background:var(--rbg);border:1px solid rgba(248,113,113,.2);border-radius:var(--r);padding:1rem;color:var(--red);font-size:13px;line-height:1.6;white-space:pre-wrap}
.note{font-size:11px;color:var(--dim);margin-top:7px}
.section-title{font-size:14px;font-weight:600;margin-bottom:8px}

/* confidence bar */
.conf-bar{display:inline-flex;align-items:center;gap:4px}
.conf-bar .cv{font-size:12px;font-weight:600;font-family:var(--mono);min-width:28px;text-align:right}
.conf-bar .cb{width:40px;height:3px;border-radius:2px;background:rgba(255,255,255,.04);overflow:hidden;position:relative}
.conf-bar .cf{height:100%;border-radius:2px;transition:width .5s ease}

/* panel fade-in */
.panel.on{animation:fadeUp .3s ease-out}

/* clickable player names */
.plink{cursor:pointer;transition:color .15s}
.plink:hover{color:#fff;text-decoration:underline;text-decoration-color:var(--dim);text-underline-offset:2px}

/* lineup builder */
.lu-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:8px 10px;display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;animation:fadeUp .3s ease-out both}
.lu-card .lu-rm{background:none;border:none;color:var(--red);cursor:pointer;font-size:14px;padding:2px 6px;border-radius:4px}
.lu-card .lu-rm:hover{background:var(--rbg)}
.exp-opt{padding:6px 12px;font-size:12px;color:var(--text);cursor:pointer;transition:background .15s}
.exp-opt:hover{background:var(--bg4);color:#fff}
.lu-total{background:var(--bg3);border:1px solid var(--border2);border-radius:var(--r);padding:12px;margin-top:8px;text-align:center}
.lu-warn{font-size:11px;padding:6px 10px;border-radius:6px;margin-top:6px;background:rgba(245,158,11,.08);color:var(--amber);border:1px solid rgba(245,158,11,.15)}
.lu-empty{text-align:center;padding:3rem 1rem;color:var(--dim)}
.add-btn{font-size:10px;padding:2px 8px;border-radius:4px;border:1px solid var(--border2);background:var(--bg3);color:var(--green);cursor:pointer;font-family:var(--mono);font-weight:700}
.add-btn:hover{background:var(--gbg);border-color:var(--green)}

/* comparison modal */
#compare-modal,#share-modal{position:fixed;top:0;left:0;width:100%;height:100%;z-index:500;align-items:flex-start;justify-content:center;padding-top:50px;background:rgba(0,0,0,.5)}
.cmp-grid{display:grid;gap:2px}
.cmp-hdr{font-size:9px;color:var(--dim);text-transform:uppercase;letter-spacing:.3px;padding:4px 6px}
.cmp-val{font-size:13px;font-family:var(--mono);font-weight:600;padding:4px 6px;background:var(--bg3);border-radius:4px}
.cmp-name{font-size:14px;font-weight:700;padding:6px;text-align:center;border-bottom:1px solid var(--border)}

/* accuracy chart */
.acc-chart{margin:1rem 0}
.acc-chart svg{width:100%;height:auto}

/* mobile all-player cards */
.mob-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:10px;margin-bottom:6px;display:none}
.mob-card .mc-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.mob-card .mc-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:4px;font-size:11px}
.mob-card .mc-stat{text-align:center}
.mob-card .mc-stat .l{font-size:8px;color:var(--dim);text-transform:uppercase}
.mob-card .mc-stat .v{font-weight:600;font-family:var(--mono)}
@media(max-width:640px){
  .mob-card{display:block}
  .mob-cards-wrap{display:block !important}
  #all-table .tw{display:none}
}

/* share canvas */
#share-canvas{border-radius:8px;max-width:100%;margin:10px auto}
.share-btn{background:var(--green);color:#000;border:none;padding:8px 20px;border-radius:6px;font-weight:700;font-size:13px;cursor:pointer;margin-top:8px}
.share-btn:hover{opacity:.9}

/* NEW lineup badge */
.new-badge{font-size:8px;background:var(--green);color:#000;padding:1px 5px;border-radius:3px;font-weight:800;margin-left:4px;animation:fadeUp .3s ease-out}

/* scrollbar refinement */
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,.06);border-radius:3px}

@media(max-width:640px){
  .hsub{display:none}
  .main{padding:.75rem}
  .sg{grid-template-columns:repeat(3,1fr)}
  .gg{grid-template-columns:1fr}
  .scard{flex-direction:column;align-items:flex-start}
  .stot{margin-left:0}
  .lr{grid-template-columns:14px 1fr 22px 38px 42px}
  .lhdr{grid-template-columns:14px 1fr 22px 38px 42px}
  .lr .lsub:nth-child(5),.lr .lsub:nth-child(6),.lhdr span:nth-child(5),.lhdr span:nth-child(6){display:none}
  .fbar{gap:4px}
}
@media(max-width:380px){.sg{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>
<div id="gtip"></div>
<div id="player-popup" onclick="if(event.target===this)closePlayer()"><div class="pp-card" id="pp-content"></div></div>
<div id="compare-modal" onclick="if(event.target===this)closeCompare()" style="display:none"><div class="pp-card" id="compare-content" style="max-width:700px"></div></div>
<div id="share-modal" onclick="if(event.target===this)closeShare()" style="display:none"><div class="pp-card" id="share-content" style="max-width:520px;text-align:center"></div></div>
<div class="header">
  <div class="logo"><div class="dot"></div>MLB HRR</div>
  <div class="hright">
    <span id="refresh-timer" style="font-size:10px;color:var(--dim);font-family:var(--mono);margin-right:6px"></span>
    <span id="hbadge" class="badge bload">LOADING</span>
    <span id="hsub" class="hsub"></span>
    <button class="btn" onclick="refreshAll()">↻</button>
  </div>
</div>

<div class="tabs" id="tabs" style="display:none">
  <button class="tab on" data-p="top">Top Plays</button>
  <button class="tab" data-p="slate">Game Slate</button>
  <button class="tab" data-p="all">All Players</button>
  <button class="tab" data-p="stacks">Stacks</button>
  <button class="tab" data-p="lineup">My Plays</button>
  <button class="tab" data-p="history">History</button>
  <button class="tab" data-p="live">Live <span class="tbadge" id="lct">—</span></button>
  <button class="tab" data-p="results">Results <span class="tbadge" id="rct">—</span></button>
</div>

<div class="main">
  <div id="p-top"     class="panel"></div>
  <div id="p-slate"   class="panel"></div>
  <div id="p-all"     class="panel"></div>
  <div id="p-stacks"  class="panel"></div>
  <div id="p-lineup"  class="panel"></div>
  <div id="p-history" class="panel"></div>
  <div id="p-live"    class="panel"></div>
  <div id="p-results" class="panel"></div>
  <div id="p-load" class="loading"><div class="spinner"></div><div class="ltxt">Loading...</div></div>
  <div id="p-err" style="display:none"></div>
</div>

<script>
const MLBAPI = "https://statsapi.mlb.com/api/v1";
const GIST = "https://gist.githubusercontent.com/R3ALJAK3/2b4a2e18268a955fd76247ca91156f94/raw/hrr-data.json";
  // Set this to your history Gist's raw URL once created. Falls back to GIST if empty.
const HISTORY_GIST = "https://gist.githubusercontent.com/R3ALJAK3/f6d2e7c04f81bb80b806ee4c635bfecd/raw/accuracy-history.json";
let DATA = null, LIVE = {}, SK = "pickScore", SD = -1, liveTimer = null, AP = "top";

const $ = id => document.getElementById(id);
const fmt = (n,d=2) => ((n)||0).toFixed(d);
// HRR display: round to integer, expose precise float on hover (v8)
const fmtHRR = n => `<span data-tip="${(n||0).toFixed(2)}">${Math.round(n||0)}</span>`;
const chip = t => `<span class="chip">${t||"?"}</span>`;
const hot = h => h ? '<span class="htag">HOT</span>' : "";

// ── WTD/MTD/YTD stats from accuracy history ──────────
function periodStats(history) {
  if (!history || !history.length) return { wtd: null, mtd: null, ytd: null };
  const now = nowET();
  const today = now.toLocaleDateString("en-CA");
  const year = today.split("-")[0];
  const month = today.split("-")[1];
  const dayOfWeek = now.getDay(); // 0=Sun
  const weekStart = new Date(now);
  weekStart.setDate(weekStart.getDate() - dayOfWeek);
  const weekStartStr = weekStart.toLocaleDateString("en-CA");

  const calc = (days) => {
    const valid = days.filter(d => d.top10HitRate != null);
    if (!valid.length) return null;
    return {
      hitRate: Math.round(valid.reduce((s,d) => s + d.top10HitRate, 0) / valid.length * 10) / 10,
      avgDiff: Math.round(valid.reduce((s,d) => s + (d.top10AvgDiff||0), 0) / valid.length * 100) / 100,
      days: valid.length,
    };
  };
  const wtdDays = history.filter(d => d.date >= weekStartStr && d.date < today);
  const mtdDays = history.filter(d => d.date.startsWith(year + "-" + month) && d.date < today);
  const ytdDays = history.filter(d => d.date.startsWith(year) && d.date < today);
  return { wtd: calc(wtdDays), mtd: calc(mtdDays), ytd: calc(ytdDays) };
}

let _nowETCache = null, _nowETTime = 0;
function nowET() {
  const t = Date.now();
  if (!_nowETCache || t - _nowETTime > 60000) { _nowETCache = new Date(new Date().toLocaleString("en-US",{timeZone:"America/New_York"})); _nowETTime = t; }
  return new Date(_nowETCache.getTime()); // return copy to prevent mutation
}
function gameTime(g) {
  if (!g.time) return new Date(0);
  const [ts, ap] = g.time.split(" ");
  let [h, m] = ts.split(":").map(Number);
  if (ap==="PM" && h!==12) h+=12;
  if (ap==="AM" && h===12) h=0;
  const d = nowET(); d.setHours(h,m,0,0); return d;
}
const notStarted = g => gameTime(g) > nowET();
const upGames = () => (DATA.games||[]).filter(notStarted);
const upIds = () => new Set(upGames().map(g=>g.id));

// Break HRR into H/R/RBI components — server-side only (single source of truth)
function breakdown(hrr, order, p) {
  if (p && p.hProj != null && p.rProj != null && p.rbiProj != null) {
    return { h: p.hProj, r: p.rProj, rbi: p.rbiProj };
  }
  // No server-side breakdown available (pre-v6 cached data)
  return { h: 0, r: 0, rbi: 0 };
}

async function fetchData(bust=false) {
  setLoad(true);
  try {
    const r = await fetch(GIST+"?t="+Date.now());
    if (!r.ok) throw new Error("HTTP "+r.status);
    DATA = await r.json();

          console.log(`Loaded ${DATA.accuracyHistory.length} history entries from history gist`);

      } catch (e) { console.log("History gist load failed, falling back:", e.message); }

async function fetchLive() {

    const d = await r.json();
    const games = d.dates?.[0]?.games||[];
    LIVE = {};
    games.forEach(g=>LIVE[g.gamePk]=g);
    const lc = games.filter(g=>g.status?.abstractGameState==="Live").length;
    const fc = games.filter(g=>g.status?.abstractGameState==="Final").length;
    $("lct").textContent = lc>0?lc+" LIVE":fc>0?fc+" final":"—";

    else if (Object.values(LIVE).some(g=>g.status?.abstractGameState==="Live")) { renderTop(); loadTop10Results(); }
  } catch(e) { console.log("Live:",e.message); }
}

// ── TOP PLAYS — fixed 10 for the day with result overlay ─────
let TOP10_RESULTS = {}; // cache of actual results keyed by playerName+team

async function loadTop10Results() {
  const top10 = DATA.dailyTop10 || DATA.topPlays?.slice(0,10) || [];
  // Collect gamePks for both Top 10 picks AND My Plays
  const gamePkMap = {};
  top10.forEach(p => {
    const gm = DATA.games?.find(g => g.id === p.gameId);
    if (gm?.gamePk) gamePkMap[gm.gamePk] = true;
  });
  (typeof MY_LINEUP !== "undefined" ? MY_LINEUP : []).forEach(p => {
    const gm = DATA.games?.find(g => g.id === p.gameId);
    if (gm?.gamePk) gamePkMap[gm.gamePk] = true;
  });
  if (!Object.keys(gamePkMap).length) return;
  // Fetch boxscores for any Final OR Live games (live = in-progress tracking)
  const fetchPks = Object.keys(gamePkMap).filter(pk => {
    const st = LIVE[pk]?.status?.abstractGameState;
    return st === "Final" || st === "Live";
  });
  for (const pk of fetchPks) {
    try {
      const r = await fetch(`${MLBAPI}/game/${pk}/boxscore`);
      const bs = await r.json();
      for (const side of ["away","home"]) {
        const td = bs.teams?.[side]; if (!td) continue;
        const abbr = td.team?.abbreviation;
        for (const p of Object.values(td.players||{})) {
          const s = p.stats?.batting; if (!s) continue;
          const key = (p.person?.fullName||"")+"_"+abbr;
          TOP10_RESULTS[key] = {
            h: parseInt(s.hits||0),
            r: parseInt(s.runs||0),
            rbi: parseInt(s.rbi||0),
            ab: parseInt(s.atBats||0),
            actual: parseInt(s.hits||0)+parseInt(s.runs||0)+parseInt(s.rbi||0)
          };
        }
      }
    } catch(e) { console.log("Boxscore err:", pk, e.message); }
  }
  renderTop();
  if (typeof renderLineup === "function") renderLineup();
}

function renderTop() {
  const top10raw = DATA.dailyTop10 || (DATA.allPlayers||[]).slice(0,10);
  // v8: Blended rank — 50/50 normalized confidence + pickScore
  const maxConf = Math.max(...top10raw.map(p => p.dataConfidence ?? p.confidence ?? 0), 1);
  const maxPick = Math.max(...top10raw.map(p => p.pickScore ?? 0), 1);
  const blendedScore = (p) => {
    const c = (p.dataConfidence ?? p.confidence ?? 0) / maxConf;
    const s = (p.pickScore ?? 0) / maxPick;
    return c * 0.5 + s * 0.5;
  };
  const top10 = [...top10raw].sort((a, b) => blendedScore(b) - blendedScore(a));
  const realPlayers = top10.filter(p => !p.isTBD && p.name !== "Lineup TBD");
  const cA = realPlayers.filter(p=>p.tier==="A").length;
  const cB = realPlayers.filter(p=>p.tier==="B").length;
  const done = realPlayers.filter(p => {
    const gm = DATA.games?.find(g=>g.id===p.gameId);
    return gm?.gamePk && LIVE[gm.gamePk]?.status?.abstractGameState === "Final";
  }).length;
  const gamesWithLineups = (DATA.games||[]).filter(g => g.awayLineupAvailable || g.homeLineupAvailable).length;
  const totalGames = (DATA.games||[]).length;
  const avgConf = realPlayers.length ? Math.round(realPlayers.reduce((s,p) => s + (p.confidence||0), 0) / realPlayers.length * 10) / 10 : 0;
  const ps = periodStats(DATA.accuracyHistory);

  let h = `<div class="sg">
    <div class="sc" style="animation:fadeUp .4s ease-out 0s both"><div class="l">Today's Picks</div><div class="v">${realPlayers.length}</div></div>
    <div class="sc" style="animation:fadeUp .4s ease-out .05s both"><div class="l">Avg Confidence</div><div class="v" style="color:${avgConf>=9?'var(--green)':avgConf>=7?'var(--amber)':'var(--red)'}">${avgConf}</div></div>
    <div class="sc" style="animation:fadeUp .4s ease-out .1s both"><div class="l">Completed</div><div class="v" style="color:${done>=realPlayers.length&&realPlayers.length>0?"var(--green)":done>0?"var(--amber)":"var(--muted)"}">${done}/${realPlayers.length}</div></div>
    <div class="sc" style="animation:fadeUp .4s ease-out .15s both"><div class="l">Top HRR</div><div class="v">${realPlayers.length?fmtHRR(realPlayers[0]?.hrr):"—"}</div></div>
    <div class="sc" style="animation:fadeUp .4s ease-out .2s both"><div class="l">Lineups</div><div class="v" style="color:${gamesWithLineups===totalGames?'var(--green)':gamesWithLineups>0?'var(--amber)':'var(--muted)'}">${gamesWithLineups}/${totalGames}</div></div>
  </div>`;

  // WTD / MTD / YTD tracker
  if (ps.wtd || ps.mtd || ps.ytd) {
    h += '<div class="sg" style="margin-bottom:1rem">';
    if (ps.wtd) h += `<div class="sc"><div class="l">WTD Hit Rate</div><div class="v" style="color:${ps.wtd.hitRate>=50?'var(--green)':'var(--amber)'}">${ps.wtd.hitRate}%</div><div style="font-size:10px;color:var(--dim)">${ps.wtd.days}d · diff ${ps.wtd.avgDiff>=0?"+":""}${ps.wtd.avgDiff}</div></div>`;
    if (ps.mtd) h += `<div class="sc"><div class="l">MTD Hit Rate</div><div class="v" style="color:${ps.mtd.hitRate>=50?'var(--green)':'var(--amber)'}">${ps.mtd.hitRate}%</div><div style="font-size:10px;color:var(--dim)">${ps.mtd.days}d · diff ${ps.mtd.avgDiff>=0?"+":""}${ps.mtd.avgDiff}</div></div>`;
    if (ps.ytd) h += `<div class="sc"><div class="l">YTD Hit Rate</div><div class="v" style="color:${ps.ytd.hitRate>=50?'var(--green)':'var(--amber)'}">${ps.ytd.hitRate}%</div><div style="font-size:10px;color:var(--dim)">${ps.ytd.days}d · diff ${ps.ytd.avgDiff>=0?"+":""}${ps.ytd.avgDiff}</div></div>`;

  }

  if (!realPlayers.length) {
    const totalPlayers = (DATA.allPlayers||[]).length;
    const confCount = (DATA.allPlayers||[]).filter(p => (p.confidence||0) >= 9.0).length;
    h += `<div class="none-state"><div class="icon">⚾</div><div class="msg">${totalPlayers > 0 ? `${totalPlayers} players projected but none reach confidence ≥ 9.0 yet.<br>${gamesWithLineups}/${totalGames} lineups confirmed — more picks appear as lineups post.` : 'No confirmed lineups yet.<br>Lineups typically post 2-4 hours before game time.'}<br>The dashboard will update automatically as lineups are announced.</div></div>`;

  }

  // Desktop table
  h += `<div class="tw" style="margin-bottom:.5rem"><table class="desktop-tbl"><thead><tr>
    <th${tip("#")}>#</th><th${tip("Player")}>Player</th><th${tip("Team")}>Team</th><th${tip("Pos")}>Pos</th><th${tip("Ord")}>Ord</th><th${tip("Opp SP")}>Opp SP</th><th${tip("Hand")}>Hand</th>

  h += '</tbody></table></div>';

  realPlayers.forEach((p,i) => {

// ── GAME SLATE — lineups with H/R/RBI projections ────
function renderSlate() {
  const games = upGames();
  if (!games.length) { $("p-slate").innerHTML='<div class="none-state"><div class="icon">⚾</div><div class="msg">All games started — check Live Scores.</div></div>'; return; }
  let h = "";
  games.forEach(g => {
    // Use lineup from game data directly (includes TBD), fall back to allPlayers
    const getLineup = (side) => {
      const abbr = g[side].abbr;
      const gamePlayers = (DATA.allPlayers||[]).filter(p=>p.team===abbr&&p.gameId===g.id).sort((a,b)=>a.order-b.order);
      if (gamePlayers.length > 0) return gamePlayers;
      // Fall back to game lineup data
      return (g[side].lineup||[]).sort((a,b)=>(a.order||1)-(b.order||1));
    };
    const ap = getLineup("away");
    const hp = getLineup("home");
    const awayTBD = !g.awayLineupAvailable && (ap.length <= 1 && (ap[0]?.name === "Lineup TBD" || ap[0]?.isTBD));
    const homeTBD = !g.homeLineupAvailable && (hp.length <= 1 && (hp[0]?.name === "Lineup TBD" || hp[0]?.isTBD));
    
    const lu = (pls, sp, isTBD) => {
      let pi = '';
      if (sp) {
        const l3 = sp.last3 && sp.last3.length ? sp.last3.map(g => g.era != null ? g.era.toFixed(1) : "—").join(", ") : "";
        pi = `<div class="pi"><strong>${sp.name}</strong> ${handTag(sp.hand)} <span class="n">${fmt(sp.era)} ERA · ${sp.k9||"?"} K/9</span>${k10tag(sp.k9||0)}${sp.last3ERA!=null?' · <span style="font-size:10px;color:'+(sp.last3ERA<3.5?'var(--green)':sp.last3ERA>5?'var(--red)':'var(--muted)')+'">L3: '+sp.last3ERA.toFixed(2)+'</span>':''}${l3?' <span style="font-size:9px;color:var(--dim)">('+l3+')</span>':''}</div>`;
      }
      let t = pi;
      if (isTBD) {
        t += '<div style="padding:12px 4px;text-align:center;color:var(--dim);font-size:12px;border:1px dashed var(--border);border-radius:6px;margin-top:6px">Awaiting lineup<br><span style="font-size:10px;color:var(--dim)">Lineups typically post 2-4 hrs before first pitch</span></div>';
        return t;
      }
      t += `<div class="lhdr"><span></span><span>Player</span><span data-tip="Fielding position">Pos</span><span data-tip="Projected hits">H</span><span data-tip="Projected runs">R</span><span data-tip="Projected RBI">RBI</span><span data-tip="Hits+Runs+RBI projection">HRR</span></div>`;
      pls.forEach(p => {
        const rc = p.tier==="A"?"a":p.tier==="B"?"b":"";
        const nc = p.tier==="A"?"a":p.tier==="B"?"b":"";
        const bd = breakdown(p.hrr, p.order, p);
        t += `<div class="lr ${rc}">
          <span class="lnum">${p.order}</span>
          <span class="lname ${nc}">${p.team?`<span class="plink" onclick="showPlayer(\`${p.name}\`,\`${p.team}\`)">${p.name}</span>`:p.name}${hot(p.hotStreak)}</span>
          <span class="lpos">${p.pos}</span>
          <span class="lsub ${nc}">${fmt(bd.h)}</span>
          <span class="lsub ${nc}">${fmt(bd.r)}</span>
          <span class="lsub ${nc}">${fmt(bd.rbi)}</span>
          <span class="lsub ${nc}">${fmtHRR(p.hrr)}</span>
        </div>`;
      });
      return t;
    };
    h += `<div class="gc">
      <div class="ghdr">
        <div>
          <div class="gtitle">${g.away.abbr} <span style="color:var(--muted);font-weight:400">@</span> ${g.home.abbr}${g.weatherRisk?' <span class="wx">⚠ WX</span>':""}</div>
          <div class="gmeta">${g.time} ET · ${g.stadium}${awayTBD||homeTBD?' · <span style="color:var(--amber);font-size:10px">⏳ Lineups pending</span>':' · <span style="color:var(--green);font-size:10px">✓ Lineups confirmed</span>'}${(!awayTBD||!homeTBD)&&!localStorage.getItem("lu_seen_"+g.gamePk)?'<span class="new-badge">NEW</span>':""}</div>
        </div>
        <div style="font-size:11px;font-family:var(--mono);color:var(--muted);text-align:right">
          ${g.envScore?`<span style="font-size:10px;font-weight:700;padding:2px 6px;border-radius:4px;background:${g.envScore>=7?'var(--gbg)':g.envScore>=4?'var(--abg)':'var(--bbg)'};color:${g.envScore>=7?'var(--green)':g.envScore>=4?'var(--amber)':'var(--blue)'}">ENV ${g.envScore}</span> · `:""}PF ${(g.parkFactor||1).toFixed(2)}×${g.weatherNote?" · "+g.weatherNote:""}
          ${g.oddsLine?`<br><span style="color:var(--amber)">O/U ${g.oddsLine.total}</span>${g.oddsLine.awayImplied&&g.oddsLine.awayImplied!==g.oddsLine.total/2?' <span style="font-size:10px;color:var(--dim)">('+g.away.abbr+' '+g.oddsLine.awayImplied.toFixed(1)+' / '+g.home.abbr+' '+g.oddsLine.homeImplied.toFixed(1)+')</span>':' <span style="color:var(--dim);font-size:10px">'+g.oddsLine.bookmaker+'</span>'}`:""}
        </div>
      </div>
      <div class="gg">
        <div><div class="tlbl">${g.away.name}</div>${lu(ap,g.away.pitcher,awayTBD)}</div>
        <div><div class="tlbl">${g.home.name}</div>${lu(hp,g.home.pitcher,homeTBD)}</div>
      </div>
    </div>`;
  });
  $("p-slate").innerHTML = h;
  // Mark lineups as seen for NEW badge tracking
  games.forEach(g => { if (g.awayLineupAvailable || g.homeLineupAvailable) localStorage.setItem("lu_seen_"+g.gamePk, "1"); });
}

// Debounce helper for search input
let _filterTimer = null;
function debouncedFilter() { clearTimeout(_filterTimer); _filterTimer = setTimeout(applyFilters, 200); }

function applyFilters() {
  const search = ($("f-search")?.value||"").toLowerCase();
  const team   = $("f-team")?.value||"";
  const tier   = $("f-tier")?.value||"";
  const pos    = $("f-pos")?.value||"";
  const hand   = $("f-hand")?.value||"";
  const upOnly = $("f-upcoming")?.checked !== false;
  const minHRR = parseFloat($("f-minhrr")?.value||0);
  const uid = upIds();
  let all = [...(DATA?.allPlayers||[])];
  if (upOnly) all = all.filter(p=>uid.has(p.gameId));
  if (search) all = all.filter(p=>p.name.toLowerCase().includes(search)||(p.team||"").toLowerCase().includes(search));
  if (team)   all = all.filter(p=>p.team===team);
  if (tier)   all = all.filter(p=>p.tier===tier);
  if (pos)    all = all.filter(p=>p.pos===pos);
  if (minHRR) all = all.filter(p=>p.hrr>=minHRR);
  if (hand) {
    all = all.filter(p => {
      const gm = DATA.games?.find(g=>g.id===p.gameId);
      const sp = gm?(p.team===gm.home.abbr?gm.away.pitcher:gm.home.pitcher):null;
      return sp?.hand === hand;
    });
  }
  // Pre-compute projected H/R/RBI so they can be sorted
  all.forEach(p => {
    const bd = breakdown(p.hrr, p.order, p);
    p.hProj = bd.h; p.rProj = bd.r; p.rbiProj = bd.rbi;
    // Get opp SP for hand sorting
    const gm = DATA.games?.find(g=>g.id===p.gameId);
    const sp = gm?(p.team===gm.home.abbr?gm.away.pitcher:gm.home.pitcher):null;
    p.spHand = sp?.hand||""; p.oppSP = sp?.name||"";
    p.bvpDisplay = p.bvp ? p.bvp.avg.toFixed(3)+"("+p.bvp.ab+")" : "";
  });
  all.sort((a,b)=>{
    const av=a[SK],bv=b[SK];
    return typeof av==="string"?av.localeCompare(bv)*SD:((bv||0)-(av||0))*-SD;
  });
  const cols=[
    {k:"name",l:"Player"},{k:"team",l:"Team"},{k:"pos",l:"Pos"},{k:"order",l:"Ord"},
    {k:"bats",l:"B"},{k:"oppSP",l:"Opp SP"},{k:"spHand",l:"Hand"},
    {k:"avg",l:"AVG"},{k:"last10Avg",l:"L10 AVG"},{k:"ops",l:"OPS"},{k:"wrcPlus",l:"wRC+"},
    {k:"barrelPct",l:"Barrel%"},{k:"hardHitPct",l:"HardHit%"},{k:"bvpDisplay",l:"BvP"},
    {k:"confidence",l:"Conf"},{k:"hProj",l:"H Proj"},{k:"rProj",l:"R Proj"},{k:"rbiProj",l:"RBI Proj"},

    h+=`<th data-k="${c.k}"${tip(c.l)}>${c.l}${ar}</th>`;
  });
  h+="<th style='width:24px'></th><th style='width:40px'></th></tr></thead><tbody>";
  all.forEach((p,idx)=>{
    const isChecked = COMPARE_LIST.some(c=>c.name===p.name&&c.team===p.team);
    h+=`<tr style="animation:fadeUp .3s ease-out ${Math.min(idx*.02,.6)}s both">
      <td style="font-weight:${p.tier==="A"?700:400}"><span class="plink" onclick="showPlayer(\`${p.name}\`,\`${p.team}\`)">${p.name}</span>${streakTag(p.streakType)}${injTag(p.injured)}</td>
      <td>${chip(p.team)}</td>
      <td style="color:var(--muted);font-size:12px">${p.pos}</td>
      <td class="n" style="text-align:center">${p.order}</td>
      <td class="n" style="text-align:center">${p.bats}</td>
      <td style="font-size:12px;color:var(--muted)">${p.oppSP||"—"}</td>
      <td>${p.spHand?handTag(p.spHand):""}</td>
      <td class="n">${p.avg?(p.avg*1000|0)/1000:"—"}</td>
      <td class="n" style="color:${p.streakType==='hot'?'var(--green)':p.streakType==='cold'?'var(--blue)':'var(--muted)'}">${p.last10Avg?(p.last10Avg*1000|0)/1000:"—"}</td>
      <td class="n">${(p.ops||0).toFixed(3)}</td>
      <td class="n">${p.wrcPlus||"—"}</td>
      <td class="n">${p.barrelPct!=null?p.barrelPct.toFixed(1)+"%":"—"}</td>
      <td class="n">${p.hardHitPct!=null?p.hardHitPct.toFixed(1)+"%":"—"}</td>
      <td class="n" style="font-size:11px;color:${p.bvp&&p.bvp.avg>=.300?'var(--green)':p.bvp&&p.bvp.avg<.200?'var(--red)':'var(--muted)'}">${p.bvpDisplay||"—"}</td>
      <td>${confBar(p.confidence)}</td>
      <td class="n" style="color:var(--green)">${fmt(p.hProj)}</td>
      <td class="n" style="color:var(--blue)">${fmt(p.rProj)}</td>
      <td class="n" style="color:var(--amber)">${fmt(p.rbiProj)}</td>
      <td class="n" style="font-weight:700">${fmtHRR(p.hrr)}</td>
      <td class="n" style="color:var(--muted)">${p.pickScore?fmt(p.pickScore):"—"}</td>
      <td>${tierB(p.tier)}</td>
      <td><input type="checkbox" ${isChecked?"checked":""} onchange="toggleCompare(\`${p.name}\`,\`${p.team}\`)" title="Compare" style="cursor:pointer"></td>
      <td>${addBtn(p)}</td>
    </tr>`;
  });
  h+="</tbody></table></div>";

  // Mobile cards
  h += '<div style="display:none" class="mob-cards-wrap">';
  all.forEach((p,idx)=>{
    const tc = p.tier==="A"?"var(--green)":p.tier==="B"?"var(--amber)":"var(--muted)";
    h += `<div class="mob-card" style="animation:fadeUp .3s ease-out ${Math.min(idx*.02,.4)}s both">
      <div class="mc-top"><div><span class="plink" onclick="showPlayer(\`${p.name}\`,\`${p.team}\`)" style="font-weight:700;color:${tc}">${p.name}</span>${streakTag(p.streakType)} <span class="chip">${p.team}</span></div><div style="font-weight:700;font-family:var(--mono);font-size:15px">${fmtHRR(p.hrr)}</div></div>
      <div class="mc-stats">
        <div class="mc-stat"><div class="l">Conf</div><div class="v">${confBar(p.confidence)}</div></div>
        <div class="mc-stat"><div class="l">Pick</div><div class="v">${p.pickScore?fmt(p.pickScore):"—"}</div></div>
        <div class="mc-stat"><div class="l">OPS</div><div class="v">${(p.ops||0).toFixed(3)}</div></div>
        <div class="mc-stat"><div class="l">Tier</div><div class="v">${tierB(p.tier)}</div></div>
      </div>
      <div style="margin-top:6px;text-align:right">${addBtn(p)}</div>
    </div>`;
  });
  h += '</div>';

  $("all-table").innerHTML=h;
  // Update compare button visibility
  const cmpBtn = $("compare-btn");
  if (cmpBtn) { cmpBtn.style.display = COMPARE_LIST.length >= 2 ? "inline-block" : "none"; const ct=$("cmp-ct"); if(ct) ct.textContent=COMPARE_LIST.length; }
  document.querySelectorAll("#all-table th[data-k]").forEach(th=>{
    th.onclick=()=>{const k=th.dataset.k;SK===k?SD*=-1:(SK=k,SD=-1);applyFilters();};
  });
}

// ── STACKS ────────────────────────────────────────────
function renderStacks() {
  const uid = upIds();

  const s3 = (DATA.stacks3||[]).filter(s=>uid.has(s.players[0]?.gameId));
  const sec = (list, title) => {
    let h = `<div class="section-title">${title}</div>`;
    if (!list.length) return h+'<p style="color:var(--muted);margin-bottom:1.5rem">No upcoming stacks.</p>';
    list.forEach((s,i)=>{
      const pl = s.players.map(p=>{
        const c=p.tier==="A"?"var(--green)":p.tier==="B"?"var(--amber)":"var(--text)";
        return `<span style="color:${c}">${p.name} <span class="n" style="font-size:11px;color:var(--muted)" data-tip="${(p.hrr||0).toFixed(2)}">${Math.round(p.hrr||0)}</span></span>`;

function renderGameStacks() {
  const gs = DATA.gameStacks || [];
  if (!gs.length) return '';
  let h = '<div style="margin-bottom:1.5rem"><div class="section-title">Game Stacks <span style="font-size:10px;color:var(--dim);font-weight:400">Both teams in high-total games (O/U 9+)</span></div>';
  gs.forEach((s, i) => {
    const pl = s.players.map(p => {
      const c = p.team === s.away ? "var(--blue)" : "var(--amber)";

    }).join('<span style="color:var(--dim);margin:0 3px">+</span>');

}

// ── HISTORY ──────────────────────────────────────────
function renderHistory() {
  const history = DATA?.accuracyHistory || [];
  if (!history.length) {
    $("p-history").innerHTML = '<div class="none-state"><div class="icon">📊</div><div class="msg">No historical data yet.<br>History builds automatically as each day completes.</div></div>';
    return;
  }

  // Overall summary
  const validDays = history.filter(d => d.top10HitRate != null);
  let h = '';
if (validDays.length >= 1) {
    const avgHitRate = Math.round(validDays.reduce((s,d) => s + d.top10HitRate, 0) / validDays.length * 10) / 10;
    const avgDiff = Math.round(validDays.reduce((s,d) => s + (d.top10AvgDiff||0), 0) / validDays.length * 100) / 100;
    const bestDay = validDays.reduce((best,d) => d.top10HitRate > best.top10HitRate ? d : best);
    const worstDay = validDays.reduce((worst,d) => d.top10HitRate < worst.top10HitRate ? d : worst);
    h += `<div class="sg">
      <div class="sc"><div class="l">Days tracked</div><div class="v">${validDays.length}</div></div>
      <div class="sc"><div class="l">Avg hit rate</div><div class="v" style="color:${avgHitRate>=50?'var(--green)':'var(--amber)'}">${avgHitRate}%</div></div>
      <div class="sc"><div class="l">Avg diff</div><div class="v" style="color:${avgDiff>=0?'var(--green)':'var(--red)'}">${avgDiff>=0?"+":""}${avgDiff}</div></div>
      <div class="sc"><div class="l">Best day</div><div class="v" style="color:var(--green)">${bestDay.top10HitRate}%<div style="font-size:10px;color:var(--dim);font-weight:400">${bestDay.date}</div></div></div>
      <div class="sc"><div class="l">Worst day</div><div class="v" style="color:var(--red)">${worstDay.top10HitRate}%<div style="font-size:10px;color:var(--dim);font-weight:400">${worstDay.date}</div></div></div>
    </div>`;
  }

  // Accuracy trend chart
  h += renderAccuracyChart(history);

// Day-by-day cards (newest first) — show threshold ladder per day
  [...history].reverse().forEach(day => {
    const t = day.top10ThresholdRates || {};
    const r2 = t[2]; // headline
    const r2Color = r2 == null ? "var(--muted)" : r2 >= 65 ? "var(--green)" : r2 >= 45 ? "var(--amber)" : "var(--red)";
    const r2Str = r2 != null ? r2 + "%" : "—";
    const diffStr = day.top10AvgDiff != null ? (day.top10AvgDiff >= 0 ? "+" : "") + day.top10AvgDiff : "—";
    const diffColor = (day.top10AvgDiff||0) >= 0 ? "var(--green)" : "var(--red)";
    const dnpRate = day.top10DNPRate;
    const dnpColor = dnpRate == null ? "var(--muted)" : dnpRate >= 30 ? "var(--red)" : dnpRate >= 15 ? "var(--amber)" : "var(--green)";
    const dnpStr = dnpRate != null ? dnpRate + "%" : "—";

    // Mini ladder strip ≥1 / ≥2 / ≥3 / ≥4
    const ladderColor = (rate, target) => rate == null ? "var(--muted)" : rate >= target ? "var(--green)" : rate >= target * 0.7 ? "var(--amber)" : "var(--red)";
    const miniLadder = `
      <div style="display:flex;gap:6px;font-family:var(--mono);font-size:10px">
        <span title="HRR≥1" style="color:${ladderColor(t[1],80)}">${t[1]!=null?t[1]+"%":"—"}</span>
        <span style="color:var(--dim)">·</span>
        <span title="HRR≥3" style="color:${ladderColor(t[3],35)}">${t[3]!=null?t[3]+"%":"—"}</span>
        <span style="color:var(--dim)">·</span>
        <span title="HRR≥4" style="color:${ladderColor(t[4],15)}">${t[4]!=null?t[4]+"%":"—"}</span>
      </div>`;

    h += `<div class="gc" style="margin-bottom:8px;cursor:pointer" onclick="toggleHistoryDay(this)">
      <div style="display:flex;justify-content:space-between;align-items:center;gap:.75rem;flex-wrap:wrap">
        <div>
          <div style="font-size:15px;font-weight:700">${day.date}<span class="chevron" style="margin-left:6px">▼</span></div>
          <div style="font-size:11px;color:var(--muted);margin-top:1px">${day.gamesCompleted||"?"} games · ${day.top10Played!=null?day.top10Played+"/"+day.top10Total+" played":(day.totalPlayers||"?")+" players"}</div>
          <div style="margin-top:4px">${miniLadder}</div>
        </div>
        <div style="display:flex;gap:14px;align-items:center;flex-wrap:wrap">
          <div style="text-align:center"><div style="font-size:9px;color:var(--dim);text-transform:uppercase" data-tip="% of top picks who hit 2+ H/R/RBI. Headline metric.">HRR ≥ 2 ★</div><div style="font-size:18px;font-weight:700;font-family:var(--mono);color:${r2Color}">${r2Str}</div></div>
          <div style="text-align:center"><div style="font-size:9px;color:var(--dim);text-transform:uppercase">Avg diff</div><div style="font-size:14px;font-weight:600;font-family:var(--mono);color:${diffColor}">${diffStr}</div></div>
          <div style="text-align:center"><div style="font-size:9px;color:var(--dim);text-transform:uppercase">DNP</div><div style="font-size:14px;font-weight:600;font-family:var(--mono);color:${dnpColor}">${dnpStr}</div></div>
        </div>
      </div>
      <div class="hist-detail" style="display:none"></div>
    </div>`;

    // Pre-build the top 10 detail table for this day (hidden until clicked)
    if (day.top10 && day.top10.length) {
      const detailId = "hd-" + day.date;
      // We'll build it on click via toggleHistoryDay
    }
  });

  h += '<div class="note" style="margin-top:1rem">Click any day to see the top 10 picks and results. History saves automatically on each new day.</div>';
  $("p-history").innerHTML = h;
}

function toggleHistoryDay(card) {
  const detail = card.querySelector(".hist-detail");
  const chev = card.querySelector(".chevron");
  if (!detail) return;
  if (detail.style.display !== "none") {
    detail.style.display = "none";
    if (chev) chev.textContent = "▼";
    return;
  }
  if (chev) chev.textContent = "▲";

  // If already built, just show
  if (detail.innerHTML) { detail.style.display = "block"; return; }

  // Find this day in history
  const dateStr = card.querySelector("div[style*='font-size:15px']")?.textContent?.replace("▼","").replace("▲","").trim();
  const day = (DATA?.accuracyHistory || []).find(d => d.date === dateStr);
  if (!day || !day.top10 || !day.top10.length) {
    detail.innerHTML = '<div style="padding:8px;color:var(--dim);font-size:12px;border-top:1px solid var(--border);margin-top:8px">No top 10 data saved for this day.</div>';
    detail.style.display = "block";
    return;
  }

  let t = '<div style="border-top:1px solid var(--border);margin-top:8px;padding-top:8px">';
  t += '<table><thead><tr><th style="cursor:default">#</th><th style="cursor:default">Player</th><th style="cursor:default">Team</th><th style="cursor:default">Pos</th><th style="cursor:default">Proj</th><th style="cursor:default">Actual</th><th style="cursor:default;text-align:center" data-tip="Hit at threshold? ≥1 / ≥2 / ≥3 / ≥4">Ladder</th><th style="cursor:default">Tier</th></tr></thead><tbody>';
  day.top10.forEach((p, i) => {
    const actual = p.actual;
    const tHits = p.thresholdHits || {};
    const dot = (hit) => hit === true ? '<span style="color:var(--green)">●</span>' : hit === false ? '<span style="color:var(--red)">○</span>' : '<span style="color:var(--dim)">—</span>';
    // For legacy v7 entries lacking thresholdHits, derive from actual
    const h1 = tHits[1] !== undefined ? tHits[1] : (actual != null ? actual >= 1 : null);
    const h2 = tHits[2] !== undefined ? tHits[2] : (actual != null ? actual >= 2 : null);
    const h3 = tHits[3] !== undefined ? tHits[3] : (actual != null ? actual >= 3 : null);
    const h4 = tHits[4] !== undefined ? tHits[4] : (actual != null ? actual >= 4 : null);
    const dnp = p.played === false;
    const rowBg = dnp ? "background:rgba(245,158,11,.05);" : h2 === true ? "background:rgba(34,197,94,.07);" : h2 === false ? "background:rgba(248,113,113,.05);" : "";
    const actualCell = dnp
      ? '<span style="color:var(--amber);font-weight:700;font-size:10px">DNP</span>'
      : actual != null
        ? `<span style="font-weight:700;color:${actual>=3?'var(--green)':actual>=2?'var(--amber)':'var(--muted)'}">${actual}</span>`
        : "—";
    t += `<tr style="${rowBg}">
      <td class="n" style="color:var(--dim)">${i+1}</td>
      <td style="font-weight:500">${p.name}</td>
      <td>${chip(p.team)}</td>
      <td style="color:var(--muted);font-size:12px">${p.pos||"—"}</td>
      <td class="n" style="font-weight:700">${fmtHRR(p.hrr)}</td>
      <td class="n">${actualCell}</td>
      <td style="text-align:center;font-family:var(--mono);font-size:13px;letter-spacing:3px">${dot(h1)}${dot(h2)}${dot(h3)}${dot(h4)}</td>
      <td>${tierB(p.tier)}</td>
    </tr>`;
  });
  t += '</tbody></table>';
  t += '<div style="font-size:10px;color:var(--dim);margin-top:6px">Ladder dots: ≥1  ≥2  ≥3  ≥4  ·  <span style="color:var(--green)">●</span> hit  <span style="color:var(--red)">○</span> miss</div></div>';
  detail.innerHTML = t;
  detail.style.display = "block";
}
function renderLive() {
  const games = Object.values(LIVE);
  if (!games.length) { $("p-live").innerHTML='<p style="color:var(--muted);padding:1rem">Checking scores... updates every 60s.</p>'; return; }
  const live=games.filter(g=>g.status?.abstractGameState==="Live" && !g.status?.detailedState?.toLowerCase().includes("delay") && !g.status?.detailedState?.toLowerCase().includes("suspend"));
  const delayed=games.filter(g=>{const d=g.status?.detailedState?.toLowerCase()||""; return d.includes("delay")||d.includes("suspend");});
  const postponed=games.filter(g=>(g.status?.detailedState||"").toLowerCase().includes("postpone"));
  const pre=games.filter(g=>g.status?.abstractGameState==="Preview"&&!(g.status?.detailedState||"").toLowerCase().includes("postpone"));
  const fin=games.filter(g=>g.status?.abstractGameState==="Final");
  let h="";
  const sec=(list,label,col)=>{
    if(!list.length) return "";
    return `<div style="font-size:12px;font-weight:600;margin:${h?"1rem":0} 0 8px;color:${col}">${label}</div>`+list.map(liveCard).join("");
  };
  h+=sec(live,"⬤ In Progress","var(--green)");
  h+=sec(delayed,"⚠ Delayed / Suspended","var(--amber)");
  h+=sec(postponed,"✕ Postponed","var(--red)");
  h+=sec(pre,"Upcoming","var(--muted)");
  h+=sec(fin,"Final","var(--muted)");
  $("p-live").innerHTML=h;
}

function liveCard(g) {
  const st=g.status?.abstractGameState;
  const det=g.status?.detailedState||"";
  const aa=g.teams?.away?.team?.abbreviation||g.teams?.away?.team?.teamCode||"?";
  const ha=g.teams?.home?.team?.abbreviation||g.teams?.home?.team?.teamCode||"?";
  const an=g.teams?.away?.team?.shortName||g.teams?.away?.team?.name||"";
  const hn=g.teams?.home?.team?.shortName||g.teams?.home?.team?.name||"";
  const ls=g.linescore;
  const ar=g.teams?.away?.score??ls?.teams?.away?.runs??"—";
  const hr=g.teams?.home?.score??ls?.teams?.home?.runs??"—";
  const isDelayed = det.toLowerCase().includes("delay");
  const isSuspended = det.toLowerCase().includes("suspend");
  const isPostponed = det.toLowerCase().includes("postpone");
  let stxt, scls;
  if (isPostponed) { stxt="Postponed"; scls="sp2"; }
  else if (isSuspended) { stxt="Suspended"; scls="sp2"; }
  else if (isDelayed) { stxt="⚠ "+det; scls="sp2"; }
  else if (st==="Live") { stxt=(ls?.currentInningOrdinal||"")+" "+(ls?.inningHalf==="Top"?"▲":"▼"); scls="sl"; }
  else if (st==="Final") { stxt="Final"; scls="sf"; }
  else { stxt=new Date(g.gameDate).toLocaleTimeString("en-US",{hour:"numeric",minute:"2-digit",timeZone:"America/New_York"}); scls="sp2"; }
  let hre="";
  if(ls&&st!=="Preview"){
    const ah=ls.teams?.away?.hits||0,hh=ls.teams?.home?.hits||0;
    const ae=ls.teams?.away?.errors||0,he=ls.teams?.home?.errors||0;
    hre=`<div style="font-size:11px;color:var(--muted);margin-top:5px;font-family:var(--mono)">${aa} H:${ah} E:${ae} &nbsp;|&nbsp; ${ha} H:${hh} E:${he}</div>`;
  }
  const canExpand = st==="Live" || st==="Final";
  const pk = g.gamePk;
  return `<div class="gc ${st==="Live"?"live":""} ${canExpand?"live-expand":""}" style="margin-bottom:8px" ${canExpand?`onclick="toggleLiveBS(${pk},this)"`:""}>
    <div style="display:flex;justify-content:space-between;align-items:center;gap:.75rem;flex-wrap:wrap">
      <div><div style="font-size:15px;font-weight:700">${aa} @ ${ha}${canExpand?'<span class="chevron" id="chev-'+pk+'">▼</span>':""}</div>
        <div style="font-size:11px;color:var(--muted);margin-top:1px">${an} vs ${hn} · ${g.venue?.name||""}</div></div>
      <div style="text-align:right"><div class="gscore">${ar} – ${hr}</div><span class="gstatus ${scls}">${stxt}</span></div>
    </div>${hre}
    <div id="lbs-${pk}" style="display:none"></div>
  </div>`;
}

async function toggleLiveBS(gamePk, card) {
  const el = document.getElementById("lbs-"+gamePk);
  const chev = document.getElementById("chev-"+gamePk);
  if (!el) return;
  if (el.style.display !== "none") {
    el.style.display = "none";
    if (chev) chev.textContent = "▼";
    return;
  }
  if (chev) chev.textContent = "▲";
  
  // Show loading
  el.innerHTML = '<div style="padding:8px;color:var(--muted);font-size:12px;border-top:1px solid var(--border);margin-top:8px">Loading box score...</div>';
  el.style.display = "block";
  
  // Fetch or use cache
  if (!LIVE_BS[gamePk]) {
    try {
      const r = await fetch(`${MLBAPI}/game/${gamePk}/boxscore`);
      LIVE_BS[gamePk] = await r.json();
    } catch(e) {
      el.innerHTML = '<div style="padding:8px;color:var(--red);font-size:12px;border-top:1px solid var(--border);margin-top:8px">Could not load box score</div>';
      return;
    }
  }
  
  const bs = LIVE_BS[gamePk];
  let h = '<div class="live-bs">';
  
  for (const side of ["away", "home"]) {
    const td = bs.teams?.[side];
    if (!td) continue;
    const abbr = td.team?.abbreviation || td.team?.teamCode || "?";
    const batters = td.battingOrder || [];
    const players = td.players || {};
    
    h += `<div style="margin-bottom:10px"><div style="font-size:12px;font-weight:600;margin-bottom:4px;color:var(--text)">${abbr} — Hitters</div>`;
    h += '<table><thead><tr><th style="cursor:default">Player</th><th style="cursor:default;text-align:center">AB</th><th style="cursor:default;text-align:center">R</th><th style="cursor:default;text-align:center">H</th><th style="cursor:default;text-align:center">RBI</th><th style="cursor:default;text-align:center">HR</th><th style="cursor:default;text-align:center">BB</th><th style="cursor:default;text-align:center">K</th><th style="cursor:default;text-align:center;color:var(--green)">HRR</th></tr></thead><tbody>';
    
    for (const id of batters) {
      const p = players["ID"+id];
      if (!p) continue;
      const s = p.stats?.batting;
      if (!s) continue;
      const ab = parseInt(s.atBats||0);
      const runs = parseInt(s.runs||0);
      const hits = parseInt(s.hits||0);
      const rbi = parseInt(s.rbi||0);
      const hr = parseInt(s.homeRuns||0);
      const bb = parseInt(s.baseOnBalls||0);
      const k = parseInt(s.strikeOuts||0);
      const hrr = hits + runs + rbi;
      const pos = p.position?.abbreviation || "";
      const hrrColor = hrr >= 3 ? "var(--green)" : hrr >= 2 ? "var(--amber)" : "var(--muted)";
      h += `<tr>
        <td class="pname">${p.person?.fullName||"?"} <span style="font-size:10px;color:var(--dim)">${pos}</span></td>
        <td style="text-align:center">${ab}</td>
        <td style="text-align:center">${runs}</td>
        <td style="text-align:center">${hits}</td>
        <td style="text-align:center">${rbi}</td>
        <td style="text-align:center">${hr}</td>
        <td style="text-align:center">${bb}</td>
        <td style="text-align:center">${k}</td>
        <td style="text-align:center;font-weight:700;color:${hrrColor}">${hrr}</td>
      </tr>`;
    }
    h += '</tbody></table></div>';
  }
  h += '</div>';
  el.innerHTML = h;
}

// Invalidate boxscore cache on each live poll so data refreshes
function clearLiveBSCache() {
  for (const pk of Object.keys(LIVE_BS)) {
    const el = document.getElementById("lbs-"+pk);
    // Only clear if the panel is currently open — force re-fetch on next toggle
    if (el && el.style.display !== "none") {
      delete LIVE_BS[pk];
      toggleLiveBS(parseInt(pk), null).catch(()=>{});
    } else {
      delete LIVE_BS[pk];
    }
  }
}

// ── RESULTS ───────────────────────────────────────────
async function renderResults() {
  const fin=Object.values(LIVE).filter(g=>g.status?.abstractGameState==="Final");
  if(!fin.length){$("p-results").innerHTML='<p style="color:var(--muted);padding:1rem">Results appear once games finish.</p>'+renderAccuracyHistory();return;}
  $("p-results").innerHTML='<p style="color:var(--muted);padding:1rem">Loading boxscores...</p>';
  const rows=[];
  for(const g of fin){
    try{
      const r=await fetch(`${MLBAPI}/game/${g.gamePk}/boxscore`);
      const bs=await r.json();
      for(const side of["away","home"]){
        const td=bs.teams?.[side];if(!td)continue;
        const abbr=td.team?.abbreviation;
        for(const p of Object.values(td.players||{})){
          const s=p.stats?.batting;if(!s)continue;
          if((s.atBats||0)===0)continue;
          const hits=parseInt(s.hits||0),runs=parseInt(s.runs||0),rbi=parseInt(s.rbi||0);
          const actual=hits+runs+rbi;
          const fullName = p.person?.fullName||"";
          const normName = n => n.normalize("NFD").replace(/[\u0300-\u036f]/g,"").toLowerCase();
          // Search allPlayers, dailyTop10, and consideredToday for projections
          const searchPools = [DATA?.allPlayers, DATA?.dailyTop10, DATA?.consideredToday].filter(Boolean);
          let proj = null;
          for (const pool of searchPools) {
            proj = pool.find(pl=>pl.name===fullName&&pl.team===abbr);
            if (!proj) proj = pool.find(pl=>normName(pl.name)===normName(fullName)&&pl.team===abbr);
            if (!proj) proj = pool.find(pl=>normName(pl.name)===normName(fullName));
            if (proj) break;
          }
          rows.push({name:p.person?.fullName||"?",abbr,hits,runs,rbi,actual,proj:proj?.hrr??null,tier:proj?.tier||null});
        }
      }
    }catch(e){console.log("BS err",g.gamePk,e.message);}
  }
  rows.sort((a,b)=>b.actual-a.actual);

  // Compute aggregate accuracy stats
  const projected = rows.filter(r=>r.proj!==null);
  const hitters = projected.filter(r=>r.actual>=Math.round(r.proj));
  const hitRate = projected.length>0?Math.round(hitters.length/projected.length*1000)/10:0;
  const avgDiff = projected.length>0?Math.round(projected.reduce((s,r)=>s+(r.actual-r.proj),0)/projected.length*100)/100:0;
  const tierARows = projected.filter(r=>r.tier==="A");
  const tierAHit = tierARows.length>0?Math.round(tierARows.filter(r=>r.actual>=Math.round(r.proj)).length/tierARows.length*1000)/10:0;
  const tierBRows = projected.filter(r=>r.tier==="B");
  const tierBHit = tierBRows.length>0?Math.round(tierBRows.filter(r=>r.actual>=Math.round(r.proj)).length/tierBRows.length*1000)/10:0;
  const top3Actual = rows.slice(0,3).reduce((s,r)=>s+r.actual,0);

  let h = `<div class="sg">
    <div class="sc"><div class="l">Hit Rate</div><div class="v" style="color:${hitRate>=55?'var(--green)':hitRate>=45?'var(--amber)':'var(--red)'}">${hitRate}%</div></div>
    <div class="sc"><div class="l">Avg Diff</div><div class="v" style="color:${avgDiff>=0?'var(--green)':'var(--red)'}">${avgDiff>=0?"+":""}${avgDiff}</div></div>
    <div class="sc"><div class="l">Tier A Rate</div><div class="v" style="color:${tierAHit>=55?'var(--green)':'var(--amber)'}">${tierAHit}%</div></div>
    <div class="sc"><div class="l">Tier B Rate</div><div class="v" style="color:var(--muted)">${tierBHit}%</div></div>
    <div class="sc"><div class="l">Top 3 Actual</div><div class="v">${top3Actual}</div></div>
    <div class="sc"><div class="l">Projected</div><div class="v">${projected.length}/${rows.length}</div></div>
  </div>`;

  h+='<div style="font-size:12px;color:var(--muted);margin-bottom:.75rem">Actual H+R+RBI vs projected HRR. Hit = actual ≥ rounded projection. "—" = bench/pinch-hit not in lineup.</div>';
  h+=`<div class="tw"><table><thead><tr><th${tip("Player")}>Player</th><th${tip("Team")}>Team</th><th${tip("Tier")}>Tier</th><th${tip("H")}>H</th><th${tip("R")}>R</th><th${tip("RBI")}>RBI</th><th${tip("Actual")}>Actual</th><th${tip("Proj HRR")}>Projected</th><th${tip("Diff")}>Diff</th></tr></thead><tbody>`;
  if(!rows.length){h+='<tr><td colspan="9" style="text-align:center;color:var(--muted);padding:1.5rem">No data yet.</td></tr>';}
  else{rows.forEach(r=>{
    const diff=r.proj!==null?Math.round((r.actual-r.proj)*100)/100:null;
    const ds=diff!==null?(diff>=0?"+"+diff:""+diff):"—";
    const dc=diff!==null?(diff>=0?"gg2":"gb2"):"";
    h+=`<tr class="${r.actual>=3?"res-win":""}">
      <td style="font-weight:500"><span class="plink" onclick="showPlayer(\`${r.name}\`,\`${r.abbr}\`)">${r.name}</span></td><td>${chip(r.abbr)}</td>
      <td>${r.tier?tierB(r.tier):'<span class="tc">—</span>'}</td>
      <td class="n">${r.hits}</td><td class="n">${r.runs}</td><td class="n">${r.rbi}</td>
      <td class="n" style="font-size:15px;font-weight:700;color:${r.actual>=3?"var(--green)":r.actual>=2?"var(--amber)":"var(--muted)"}">${r.actual}</td>
      <td class="n">${r.proj!==null?fmtHRR(r.proj):"—"}</td>
      <td class="n ${dc}">${ds}</td></tr>`;
  });}
  h+='</tbody></table></div>';

  // Append accuracy history
  h += renderAccuracyHistory();

  $("p-results").innerHTML=h;
}

function renderAccuracyHistory() {
  const history = DATA?.accuracyHistory || [];
  if (!history.length) return '';
  let h = '<div style="margin-top:1.5rem"><div class="section-title" style="display:flex;align-items:center;gap:8px">Model Accuracy History <span style="font-size:10px;color:var(--dim);font-weight:400">Last '+history.length+' days</span></div>';
  
  // Summary stats across all days
  const validDays = history.filter(d => d.top10HitRate != null);
  if (validDays.length >= 2) {
    const avgHitRate = Math.round(validDays.reduce((s,d) => s + d.top10HitRate, 0) / validDays.length * 10) / 10;
    const avgDiff = Math.round(validDays.reduce((s,d) => s + (d.top10AvgDiff||0), 0) / validDays.length * 100) / 100;
    const bestDay = validDays.reduce((best,d) => d.top10HitRate > best.top10HitRate ? d : best);
    h += `<div class="sg" style="margin-bottom:.75rem">
      <div class="sc"><div class="l">Avg Hit Rate</div><div class="v" style="color:${avgHitRate>=55?'var(--green)':'var(--amber)'}">${avgHitRate}%</div></div>
      <div class="sc"><div class="l">Avg Diff</div><div class="v" style="color:${avgDiff>=0?'var(--green)':'var(--red)'}">${avgDiff>=0?"+":""}${avgDiff}</div></div>
      <div class="sc"><div class="l">Best Day</div><div class="v" style="color:var(--green)">${bestDay.top10HitRate}%</div></div>
      <div class="sc"><div class="l">Days Tracked</div><div class="v">${validDays.length}</div></div>
    </div>`;
  }

  h += `<div class="tw"><table><thead><tr><th${tip("Date")}>Date</th><th${tip("Top 10 Hit%")}>Top 10 Hit%</th><th${tip("Avg Diff")}>Avg Diff</th><th${tip("Tier A")}>Tier A</th><th${tip("Tier B")}>Tier B</th><th${tip("Games")}>Games</th></tr></thead><tbody>`;
  [...history].reverse().forEach(d => {
    const hr = d.top10HitRate != null ? d.top10HitRate + "%" : "—";
    const hrColor = d.top10HitRate >= 60 ? "var(--green)" : d.top10HitRate >= 40 ? "var(--amber)" : "var(--red)";
    h += `<tr>
      <td class="n">${d.date}</td>
      <td class="n" style="font-weight:700;color:${hrColor}">${hr}</td>
      <td class="n" style="color:${(d.top10AvgDiff||0)>=0?'var(--green)':'var(--red)'}">${d.top10AvgDiff!=null?(d.top10AvgDiff>=0?"+":"")+d.top10AvgDiff:"—"}</td>
      <td class="n">${d.tierAHitRate!=null?d.tierAHitRate+"%":"—"}</td>
      <td class="n">${d.tierBHitRate!=null?d.tierBHitRate+"%":"—"}</td>
      <td class="n">${d.gamesCompleted||"—"}</td>
    </tr>`;
  });
  h += '</tbody></table></div></div>';
  return h;
}

function exportCSV() {
  if(!DATA?.allPlayers) return;
  const uid=upIds();
  const team=$("f-team")?.value||"";

  if(team)all=all.filter(p=>p.team===team);

  const rows=all.map(p=>{
    const gm=DATA.games?.find(g=>g.id===p.gameId);

    const bd=breakdown(p.hrr,p.order,p);
    return `"${p.name}",${p.team},${p.pos},${p.order},${p.bats},"${sp?sp.name:"—"}",${sp?sp.hand:""},${(p.ops||0).toFixed(3)},${p.wrcPlus||0},${p.bvp?p.bvp.avg.toFixed(3):""},${p.bvp?p.bvp.ab:""},${p.confidence||""},${fmt(bd.h)},${fmt(bd.r)},${fmt(bd.rbi)},${fmt(p.hrr)},${p.pickScore?fmt(p.pickScore):""},${p.tier}`;
  });
  const csv=["Player,Team,Pos,Order,Bats,Opp SP,SP Hand,OPS,wRC+,BvP AVG,BvP AB,Conf,H Proj,R Proj,RBI Proj,HRR,Pick,Tier",...rows].join("\n");
  const a=document.createElement("a");
  a.href="data:text/csv;charset=utf-8,"+encodeURIComponent(csv);
