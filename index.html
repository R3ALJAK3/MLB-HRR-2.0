<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>MLB HRR Dashboard</title>
<link rel="manifest" href="data:application/json,%7B%22name%22%3A%22MLB%20HRR%22%2C%22short_name%22%3A%22HRR%22%2C%22start_url%22%3A%22.%22%2C%22display%22%3A%22standalone%22%2C%22background_color%22%3A%22%2308080a%22%2C%22theme_color%22%3A%22%2310b981%22%7D">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#08080a">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#08080a;--bg2:#1a1a1f;--bg3:#222228;--bg4:#2a2a32;
  --border:rgba(255,255,255,0.08);--text:#e2e8f0;--muted:#94a3b8;
  --cyan:#06b6d4;--green:#10b981;--amber:#f59e0b;--red:#ef4444;
}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;overscroll-behavior-y:none;overflow-x:hidden}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.animate-fade{animation:fadeUp 0.3s ease-out forwards}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:10px}
</style>
</head>
<body>
<div id="root"></div>
<script>
if('serviceWorker' in navigator){
  window.addEventListener('load',()=> {
    navigator.serviceWorker.register('sw.js').catch(err=>console.log('SW registration failed',err));
  });
}
</script>
<script defer src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script defer src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script defer src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script type="text/babel" src="mlb-hrr-dashboard.jsx"></script>
</body>
</html>
