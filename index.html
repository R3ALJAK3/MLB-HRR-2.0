// ══════════════════════════════════════════════════════
// ── 1. MY PLAYS TRACKER ──────────────────────────────
// (internal storage key: hrr_lineup, kept for back-compat)
// ══════════════════════════════════════════════════════
let MY_LINEUP = JSON.parse(localStorage.getItem("hrr_lineup")||"[]");
let MY_PLAYS_HISTORY = JSON.parse(localStorage.getItem("hrr_plays_history")||"[]");

// Logical day = ET date with 4 AM rollover (anything before 4 AM = previous day)
function logicalToday() {
  const et = nowET();
  if (et.getHours() < 4) et.setDate(et.getDate() - 1);
  return et.toLocaleDateString("en-CA");
}

async function checkRollover() {
  const today = logicalToday();
  const lastDay = localStorage.getItem("hrr_plays_day");
  if (lastDay && lastDay !== today && MY_LINEUP.length > 0) {
    await archivePlays(lastDay);
  }
  localStorage.setItem("hrr_plays_day", today);
}

async function archivePlays(date) {
  // Resolve gamePks (use snapshot, fall back to gameId lookup)
  const gamePks = new Set();
  MY_LINEUP.forEach(p => {
    let pk = p.gamePk;
    if (!pk && p.gameId && DATA?.games) {
      const gm = DATA.games.find(g => g.id === p.gameId);
      pk = gm?.gamePk;
    }
    if (pk) gamePks.add(pk);
  });
  // Fetch final boxscores
  const results = {};
  for (const pk of gamePks) {
    try {
      const r = await fetch(`${MLBAPI}/game/${pk}/boxscore`);
      const bs = await r.json();
      for (const side of ["away","home"]) {
        const td = bs.teams?.[side]; if (!td) continue;
        const abbr = td.team?.abbreviation;
        for (const pl of Object.values(td.players||{})) {
          const s = pl.stats?.batting; if (!s) continue;
          const key = (pl.person?.fullName||"")+"_"+abbr;
          results[key] = {
            h: parseInt(s.hits||0),
            r: parseInt(s.runs||0),
            rbi: parseInt(s.rbi||0),
            ab: parseInt(s.atBats||0),
            actual: parseInt(s.hits||0)+parseInt(s.runs||0)+parseInt(s.rbi||0)
          };
        }
      }
    } catch(e) { console.log("Archive bs err:", pk, e.message); }
  }
  // Enrich plays with results + compute summary
  const enriched = MY_LINEUP.map(p => {
    const key = p.name + "_" + p.team;
    const res = results[key];
    return { ...p, actual: res?.actual ?? null, ab: res?.ab ?? 0 };
  });
  const played = enriched.filter(p => p.ab > 0);
  const hits = played.filter(p => p.actual >= Math.round(p.hrr));
  const hitRate = played.length > 0 ? Math.round(hits.length / played.length * 1000) / 10 : null;
  const avgDiff = played.length > 0 ? Math.round(played.reduce((s,p) => s + (p.actual - p.hrr), 0) / played.length * 100) / 100 : null;
  const dnpRate = enriched.length > 0 ? Math.round((enriched.length - played.length) / enriched.length * 1000) / 10 : null;

  MY_PLAYS_HISTORY.push({ date, plays: enriched, played: played.length, total: enriched.length, hitRate, avgDiff, dnpRate });
  if (MY_PLAYS_HISTORY.length > 60) MY_PLAYS_HISTORY = MY_PLAYS_HISTORY.slice(-60);
  localStorage.setItem("hrr_plays_history", JSON.stringify(MY_PLAYS_HISTORY));
  MY_LINEUP = [];
  localStorage.setItem("hrr_lineup", "[]");
  console.log(`Archived ${enriched.length} plays for ${date} (hit rate: ${hitRate}%, DNP: ${dnpRate}%)`);
}

function addToLineup(name, team) {
  if (MY_LINEUP.some(p => p.name===name && p.team===team)) return;
  const p = (DATA?.allPlayers||[]).find(x=>x.name===name&&x.team===team);
  if (!p) return;
  const gm = DATA?.games?.find(g => g.id === p.gameId);
  MY_LINEUP.push({
    name:p.name, team:p.team, hrr:p.hrr, pickScore:p.pickScore,
    confidence:p.confidence, tier:p.tier, pos:p.pos, order:p.order,
    gameId:p.gameId, gamePk:gm?.gamePk, addedAt:Date.now()
  });
  localStorage.setItem("hrr_lineup",JSON.stringify(MY_LINEUP));
  renderLineup();
}

function removeFromLineup(name, team) {
  MY_LINEUP = MY_LINEUP.filter(p=>!(p.name===name&&p.team===team));
  localStorage.setItem("hrr_lineup",JSON.stringify(MY_LINEUP));
  renderLineup();
}

function clearLineup() {
  if (MY_LINEUP.length > 0 && !confirm("Clear all "+MY_LINEUP.length+" plays for today? This cannot be undone.")) return;
  MY_LINEUP = [];
  localStorage.setItem("hrr_lineup","[]");
  renderLineup();
}

function clearPlaysHistory() {
  if (!confirm("Clear all play history? This cannot be undone.")) return;
  MY_PLAYS_HISTORY = [];
  localStorage.setItem("hrr_plays_history","[]");
  renderLineup();
}

function renderLineup() {
  if (!DATA) return;
  const el = $("p-lineup");
  if (!el) return;

  let h = '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px"><div class="section-title" style="margin:0">My Plays <span style="font-size:11px;color:var(--dim);font-weight:400">· '+logicalToday()+'</span></div><div>';
  h += `<div style="position:relative;display:inline-block"><button class="btn" onclick="document.getElementById('export-dd').style.display=document.getElementById('export-dd').style.display==='block'?'none':'block'" style="margin-right:4px">Export ▾</button><div id="export-dd" style="display:none;position:absolute;top:100%;left:0;z-index:20;background:var(--bg3);border:1px solid var(--border2);border-radius:6px;min-width:160px;padding:4px 0;margin-top:4px"><div class="exp-opt" onclick="exportBook('dk')">DraftKings</div><div class="exp-opt" onclick="exportBook('fd')">FanDuel</div><div class="exp-opt" onclick="exportBook('mgm')">BetMGM</div><div class="exp-opt" onclick="exportBook('fan')">Fanatics Sportsbook</div><div class="exp-opt" onclick="exportBook('b365')">Bet365</div><div class="exp-opt" onclick="exportBook('generic')">Generic CSV</div></div></div>`;
  h += `<button class="btn" onclick="clearLineup()" style="color:var(--red)">Clear</button></div></div>`;

  if (!MY_LINEUP.length) {
    h += '<div class="lu-empty"><div style="font-size:24px;margin-bottom:8px">⚾</div><div>Click <span class="add-btn" style="pointer-events:none">+ Add</span> on any player to track your plays</div><div style="font-size:11px;color:var(--dim);margin-top:6px">Resets nightly at 4 AM ET · No limit</div></div>';
    h += renderPlaysHistory();
    el.innerHTML = h;
    return;
  }

  // Enrich each play with live result data
  const enriched = MY_LINEUP.map(p => {
    const key = p.name + "_" + p.team;
    const res = TOP10_RESULTS[key];
    const gm = DATA?.games?.find(g => g.id === p.gameId);
    const gameStatus = gm?.gamePk ? LIVE[gm.gamePk]?.status?.abstractGameState : null;
    return { ...p, result: res || null, gameStatus };
  });

  // Live summary stats
  const finalPlays = enriched.filter(p => p.gameStatus === "Final");
  const finalPlayed = finalPlays.filter(p => (p.result?.ab || 0) > 0);
  const hits = finalPlayed.filter(p => p.result.actual >= Math.round(p.hrr));
  const liveHitRate = finalPlayed.length > 0 ? Math.round(hits.length / finalPlayed.length * 1000) / 10 : null;
  const totalHRR = MY_LINEUP.reduce((s,p)=>s+p.hrr,0);
  const totalActual = enriched.reduce((s,p) => s + (p.result?.actual || 0), 0);
  const avgConf = MY_LINEUP.reduce((s,p)=>s+(p.confidence||0),0)/MY_LINEUP.length;

  // Correlation check
  const gameGroups = {};
  MY_LINEUP.forEach(p => { const k=p.gameId||"?"; gameGroups[k]=(gameGroups[k]||0)+1; });
  const correlated = Object.entries(gameGroups).filter(([,c])=>c>=3);

  h += `<div class="sg" style="grid-template-columns:repeat(auto-fit,minmax(85px,1fr))">
    <div class="sc"><div class="l">Plays</div><div class="v">${MY_LINEUP.length}</div></div>
    <div class="sc"><div class="l">Proj HRR</div><div class="v" style="color:var(--green)">${totalHRR.toFixed(2)}</div></div>
    <div class="sc"><div class="l">Actual</div><div class="v" style="color:${totalActual>=totalHRR?'var(--green)':'var(--amber)'}">${totalActual}</div></div>
    <div class="sc"><div class="l">Hit Rate</div><div class="v" style="color:${liveHitRate==null?'var(--muted)':liveHitRate>=50?'var(--green)':'var(--amber)'}">${liveHitRate==null?"—":liveHitRate+"%"}</div><div style="font-size:10px;color:var(--dim)">${finalPlayed.length}/${MY_LINEUP.length} done</div></div>
    <div class="sc"><div class="l">Avg Conf</div><div class="v" style="color:${avgConf>=9?'var(--green)':avgConf>=7?'var(--amber)':'var(--red)'}">${avgConf.toFixed(1)}</div></div>
  </div>`;

  if (correlated.length) {
    correlated.forEach(([gId, count]) => {
      const gm = DATA.games?.find(g=>g.id==gId);
      const label = gm ? `${gm.away?.abbr}@${gm.home?.abbr}` : `Game #${gId}`;
      h += `<div class="lu-warn">⚠ ${count} picks in ${label} — high correlation risk</div>`;
    });
  }

  enriched.forEach((p,i) => {
    const tc = p.tier==="A"?"var(--green)":p.tier==="B"?"var(--amber)":"var(--muted)";
    let resultBlock = "";
    let cardBg = "";
    if (p.gameStatus === "Final") {
      if ((p.result?.ab || 0) > 0) {
        const hit = p.result.actual >= Math.round(p.hrr);
        const diff = p.result.actual - p.hrr;
        const diffStr = (diff >= 0 ? "+" : "") + diff.toFixed(2);
        resultBlock = `<span style="font-size:11px;font-weight:700;color:${hit?'var(--green)':'var(--red)'};font-family:var(--mono);margin-left:6px">${hit?'✓':'✗'} ${p.result.actual} (${diffStr})</span>`;
        cardBg = hit ? "background:rgba(34,197,94,.05);" : "background:rgba(248,113,113,.05);";
      } else {
        resultBlock = `<span style="font-size:10px;font-weight:700;color:var(--amber);font-family:var(--mono);margin-left:6px">DNP</span>`;
        cardBg = "background:rgba(245,158,11,.05);";
      }
    } else if (p.gameStatus === "Live") {
      if (p.result) {
        resultBlock = `<span style="font-size:11px;font-weight:700;color:var(--green);font-family:var(--mono);margin-left:6px">● ${p.result.actual} HRR</span>`;
      } else {
        resultBlock = `<span style="font-size:10px;color:var(--green);font-weight:700;margin-left:6px">● LIVE</span>`;
      }
    }
    h += `<div class="lu-card" style="${cardBg}animation-delay:${i*.03}s">
      <div><span style="color:${tc};font-weight:700" class="plink" onclick="showPlayer(\`${p.name}\`,\`${p.team}\`)">${p.name}</span> <span class="chip">${p.team}</span> <span style="font-size:10px;color:var(--dim)">${p.pos} #${p.order}</span>${resultBlock}</div>
      <div style="display:flex;align-items:center;gap:8px"><span style="font-weight:700;font-family:var(--mono)" data-tip="${(p.hrr||0).toFixed(2)}">${Math.round(p.hrr||0)}</span>${confBar(p.confidence)}<button class="lu-rm" onclick="removeFromLineup(\`${p.name}\`,\`${p.team}\`)" title="Remove">✕</button></div>
    </div>`;
  });

  h += renderPlaysHistory();
  el.innerHTML = h;
}

function myPlaysPeriodStats(history) {
  if (!history || !history.length) return { wtd: null, mtd: null, ytd: null };
  const today = logicalToday();
  const year = today.split("-")[0];
  const month = today.split("-")[1];
  const now = nowET();
  const dayOfWeek = now.getDay();
  const weekStart = new Date(now);
  weekStart.setDate(weekStart.getDate() - dayOfWeek);
  const weekStartStr = weekStart.toLocaleDateString("en-CA");

  const calc = (days) => {
    const valid = days.filter(d => d.hitRate != null);
    if (!valid.length) return null;
    // Weight by play count (12 plays one day matters more than 2 plays another)
    const totalPlays = valid.reduce((s, d) => s + (d.played || 0), 0);
    const totalHits = valid.reduce((s, d) => s + Math.round((d.hitRate / 100) * (d.played || 0)), 0);
    const hitRate = totalPlays > 0 ? Math.round(totalHits / totalPlays * 1000) / 10 : null;
    const avgDiff = Math.round(valid.reduce((s, d) => s + (d.avgDiff || 0), 0) / valid.length * 100) / 100;
    return { hitRate, avgDiff, days: valid.length, plays: totalPlays };
  };
  // Exclude today (today is shown in the live counter above)
  const wtdDays = history.filter(d => d.date >= weekStartStr && d.date < today);
  const mtdDays = history.filter(d => d.date.startsWith(year + "-" + month) && d.date < today);
  const ytdDays = history.filter(d => d.date.startsWith(year) && d.date < today);
  return { wtd: calc(wtdDays), mtd: calc(mtdDays), ytd: calc(ytdDays) };
}

function renderPlaysHistory() {
  if (!MY_PLAYS_HISTORY.length) return '';
  const valid = MY_PLAYS_HISTORY.filter(d => d.hitRate != null);
  let h = '<div style="margin-top:1.5rem"><div class="section-title" style="display:flex;align-items:center;justify-content:space-between">My Plays History <button class="btn btn-sm" onclick="clearPlaysHistory()" style="color:var(--red);font-size:10px">Clear All</button></div>';

  // WTD / MTD / YTD tracker (parallel to the system's tracker on Top Plays tab)
  const ps = myPlaysPeriodStats(MY_PLAYS_HISTORY);
  if (ps.wtd || ps.mtd || ps.ytd) {
    h += '<div class="sg" style="margin-bottom:.75rem">';
    if (ps.wtd) h += `<div class="sc"><div class="l">WTD My Plays</div><div class="v" style="color:${ps.wtd.hitRate>=60?'var(--green)':ps.wtd.hitRate>=40?'var(--amber)':'var(--red)'}">${ps.wtd.hitRate}%</div><div style="font-size:10px;color:var(--dim)">${ps.wtd.plays} plays · diff ${ps.wtd.avgDiff>=0?"+":""}${ps.wtd.avgDiff}</div></div>`;
    if (ps.mtd) h += `<div class="sc"><div class="l">MTD My Plays</div><div class="v" style="color:${ps.mtd.hitRate>=60?'var(--green)':ps.mtd.hitRate>=40?'var(--amber)':'var(--red)'}">${ps.mtd.hitRate}%</div><div style="font-size:10px;color:var(--dim)">${ps.mtd.plays} plays · diff ${ps.mtd.avgDiff>=0?"+":""}${ps.mtd.avgDiff}</div></div>`;
    if (ps.ytd) h += `<div class="sc"><div class="l">YTD My Plays</div><div class="v" style="color:${ps.ytd.hitRate>=60?'var(--green)':ps.ytd.hitRate>=40?'var(--amber)':'var(--red)'}">${ps.ytd.hitRate}%</div><div style="font-size:10px;color:var(--dim)">${ps.ytd.plays} plays · diff ${ps.ytd.avgDiff>=0?"+":""}${ps.ytd.avgDiff}</div></div>`;
    h += '</div>';
  }

  // All-time totals
  if (valid.length >= 1) {
    const avgHitRate = Math.round(valid.reduce((s,d) => s + d.hitRate, 0) / valid.length * 10) / 10;
    const avgDiff = Math.round(valid.reduce((s,d) => s + (d.avgDiff||0), 0) / valid.length * 100) / 100;
    const totalPlays = MY_PLAYS_HISTORY.reduce((s,d) => s + d.total, 0);
    h += `<div class="sg" style="margin-bottom:.5rem">
      <div class="sc"><div class="l">Days</div><div class="v">${MY_PLAYS_HISTORY.length}</div></div>
      <div class="sc"><div class="l">Total Plays</div><div class="v">${totalPlays}</div></div>
      <div class="sc"><div class="l">All-Time Hit Rate</div><div class="v" style="color:${avgHitRate>=50?'var(--green)':'var(--amber)'}">${avgHitRate}%</div></div>
      <div class="sc"><div class="l">Avg Diff</div><div class="v" style="color:${avgDiff>=0?'var(--green)':'var(--red)'}">${avgDiff>=0?"+":""}${avgDiff}</div></div>
    </div>`;
  }
  [...MY_PLAYS_HISTORY].reverse().forEach(day => {
    const hr = day.hitRate != null ? day.hitRate + "%" : "—";
    const hrColor = day.hitRate >= 50 ? "var(--green)" : day.hitRate >= 30 ? "var(--amber)" : "var(--red)";
    const diffStr = day.avgDiff != null ? (day.avgDiff >= 0 ? "+" : "") + day.avgDiff : "—";
    const diffColor = (day.avgDiff||0) >= 0 ? "var(--green)" : "var(--red)";
    const dnpStr = day.dnpRate != null ? day.dnpRate + "%" : "—";
    const dnpColor = day.dnpRate == null ? "var(--muted)" : day.dnpRate >= 30 ? "var(--red)" : day.dnpRate >= 15 ? "var(--amber)" : "var(--green)";
    h += `<div class="gc" style="margin-bottom:8px;cursor:pointer" onclick="togglePlaysHistoryDay(this)">
      <div style="display:flex;justify-content:space-between;align-items:center;gap:.75rem;flex-wrap:wrap">
        <div>
          <div style="font-size:15px;font-weight:700">${day.date}<span class="chevron" style="margin-left:6px">▼</span></div>
          <div style="font-size:11px;color:var(--muted);margin-top:1px">${day.played}/${day.total} played</div>
        </div>
        <div style="display:flex;gap:14px;align-items:center;flex-wrap:wrap">
          <div style="text-align:center"><div style="font-size:9px;color:var(--dim);text-transform:uppercase">Hit rate</div><div style="font-size:16px;font-weight:700;font-family:var(--mono);color:${hrColor}">${hr}</div></div>
          <div style="text-align:center"><div style="font-size:9px;color:var(--dim);text-transform:uppercase">Avg diff</div><div style="font-size:16px;font-weight:700;font-family:var(--mono);color:${diffColor}">${diffStr}</div></div>
          <div style="text-align:center"><div style="font-size:9px;color:var(--dim);text-transform:uppercase">DNP</div><div style="font-size:14px;font-weight:600;font-family:var(--mono);color:${dnpColor}">${dnpStr}</div></div>
        </div>
      </div>
      <div class="plays-detail" style="display:none"></div>
    </div>`;
  });
  h += '</div>';
  return h;
}

function togglePlaysHistoryDay(card) {
  const detail = card.querySelector(".plays-detail");
  const chev = card.querySelector(".chevron");
  if (!detail) return;
  if (detail.style.display !== "none") {
    detail.style.display = "none";
    if (chev) chev.textContent = "▼";
    return;
  }
  if (chev) chev.textContent = "▲";
  if (detail.innerHTML) { detail.style.display = "block"; return; }
  const dateStr = card.querySelector("div[style*='font-size:15px']")?.textContent?.replace("▼","").replace("▲","").trim();
  const day = MY_PLAYS_HISTORY.find(d => d.date === dateStr);
  if (!day || !day.plays?.length) {
    detail.innerHTML = '<div style="padding:8px;color:var(--dim);font-size:12px;border-top:1px solid var(--border);margin-top:8px">No data.</div>';
    detail.style.display = "block"; return;
  }
  let t = '<div style="border-top:1px solid var(--border);margin-top:8px;padding-top:8px"><table><thead><tr><th style="cursor:default">Player</th><th style="cursor:default">Team</th><th style="cursor:default">Pos</th><th style="cursor:default">Conf</th><th style="cursor:default">Proj</th><th style="cursor:default">AB</th><th style="cursor:default">Actual</th><th style="cursor:default">Result</th></tr></thead><tbody>';
  day.plays.forEach(p => {
    const played = (p.ab||0) > 0;
    const hit = played ? p.actual >= Math.round(p.hrr) : null;
    let resultCell = "—"; let rowBg = "";
    if (!played) {
      resultCell = '<span style="color:var(--amber);font-weight:700;font-size:10px">DNP</span>';
      rowBg = "background:rgba(245,158,11,.05);";
    } else if (hit) {
      resultCell = `<span style="color:var(--green);font-weight:700">✓</span>`;
      rowBg = "background:rgba(34,197,94,.05);";
    } else {
      resultCell = `<span style="color:var(--red);font-weight:700">✗</span>`;
      rowBg = "background:rgba(248,113,113,.05);";
    }
    t += `<tr style="${rowBg}">
      <td style="font-weight:500">${p.name}</td>
      <td>${chip(p.team)}</td>
      <td style="color:var(--muted);font-size:12px">${p.pos||"—"}</td>
      <td>${confBar(p.confidence)}</td>
      <td class="n" style="font-weight:700">${fmtHRR(p.hrr)}</td>
      <td class="n" style="text-align:center">${p.ab||0}</td>
      <td class="n" style="font-weight:700">${p.actual!=null?p.actual:"—"}</td>
      <td>${resultCell}</td>
    </tr>`;
  });
  t += '</tbody></table></div>';
  detail.innerHTML = t;
  detail.style.display = "block";
}

// ══════════════════════════════════════════════════════
let refreshCountdown = 300;
let refreshInterval = null;
function startAutoRefresh() {
  if (refreshInterval) clearInterval(refreshInterval);
  refreshCountdown = 300;
  refreshInterval = setInterval(() => {
    refreshCountdown--;
    const el = $("refresh-timer");
    if (el) {
      if (refreshCountdown <= 0) {
        el.textContent = "refreshing...";
        refreshCountdown = 300;
        fetchData(true).then(fetchLive);
      } else {
        const m = Math.floor(refreshCountdown / 60);
        const s = refreshCountdown % 60;
        el.textContent = `${m}:${s.toString().padStart(2,"0")}`;
      }
    }
  }, 1000);
}

function getLineupChanges() {
  const lastVisit = parseInt(localStorage.getItem("hrr_last_visit")||"0");
  const changes = [];
  if (!DATA?.games || !lastVisit) return changes;
  // Mark games whose lineups are now available
  DATA.games.forEach(g => {
    const key = `lu_${g.gamePk}`;
    const wasAvail = localStorage.getItem(key);
    const nowAvail = g.awayLineupAvailable || g.homeLineupAvailable;
    if (nowAvail && !wasAvail) {
      changes.push(g);
      localStorage.setItem(key, "1");
    }
  });
  return changes;
}

function markVisit() {
  localStorage.setItem("hrr_last_visit", Date.now().toString());
}

function sharePicks() {
  const top = DATA?.dailyTop10 || [];
  const real = top.filter(p=>!p.isTBD&&p.name!=="Lineup TBD");
  if (!real.length) return;

  const canvas = document.createElement("canvas");
  const w = 500, rowH = 28, padTop = 70, padBot = 30;
  canvas.width = w;
  canvas.height = padTop + real.length * rowH + padBot;
  const ctx = canvas.getContext("2d");

  // Background
  ctx.fillStyle = "#08080a";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Header
  ctx.fillStyle = "#10b981";
  ctx.beginPath(); ctx.arc(20, 24, 5, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = "#e4e4e7";
  ctx.font = "bold 16px -apple-system, sans-serif";
  ctx.fillText("MLB HRR Top Plays", 32, 30);
  ctx.fillStyle = "#71717a";
  ctx.font = "11px -apple-system, sans-serif";
  ctx.fillText(DATA.date + " · " + real.length + " picks", 32, 48);

  // Column headers
  ctx.fillStyle = "#3f3f46";
  ctx.font = "bold 9px -apple-system, sans-serif";
  ctx.fillText("#", 16, padTop - 8);
  ctx.fillText("PLAYER", 36, padTop - 8);
  ctx.fillText("TEAM", 240, padTop - 8);
  ctx.fillText("CONF", 300, padTop - 8);
  ctx.fillText("HRR", 360, padTop - 8);
  ctx.fillText("PICK", 420, padTop - 8);

  // Rows
  real.forEach((p, i) => {
    const y = padTop + i * rowH + 16;
    if (i % 2 === 0) { ctx.fillStyle = "rgba(255,255,255,.02)"; ctx.fillRect(10, y - 14, w - 20, rowH); }
    ctx.fillStyle = "#71717a"; ctx.font = "12px -apple-system, sans-serif"; ctx.fillText(i + 1, 16, y);
    ctx.fillStyle = p.tier === "A" ? "#10b981" : p.tier === "B" ? "#f59e0b" : "#a1a1aa";
    ctx.font = "bold 12px -apple-system, sans-serif"; ctx.fillText(p.name, 36, y);
    ctx.fillStyle = "#71717a"; ctx.font = "11px -apple-system, sans-serif"; ctx.fillText(p.team, 240, y);
    ctx.fillStyle = (p.confidence||0) >= 9 ? "#10b981" : "#f59e0b"; ctx.fillText((p.confidence||0).toFixed(1), 300, y);
    ctx.fillStyle = "#e4e4e7"; ctx.font = "bold 13px monospace"; ctx.fillText(Math.round(p.hrr||0), 360, y);
    ctx.fillStyle = "#71717a"; ctx.font = "11px monospace"; ctx.fillText(p.pickScore?fmt(p.pickScore):"—", 420, y);
  });

  // Footer
  ctx.fillStyle = "#3f3f46"; ctx.font = "9px -apple-system, sans-serif";
  ctx.fillText("r3aljak3.github.io/MLB-HRR-2.0", 16, canvas.height - 10);

  const el = $("share-content");
  el.innerHTML = '<div style="font-weight:700;margin-bottom:8px">Share Your Picks</div>';
  el.appendChild(canvas);
  canvas.id = "share-canvas";
  el.innerHTML += '<br><button class="share-btn" onclick="downloadShareImage()">Download Image</button> <button class="btn" onclick="closeShare()" style="margin-left:8px">Close</button>';
  $("share-modal").style.display = "flex";
}

function downloadShareImage() {
  const canvas = $("share-canvas"); if (!canvas) return;

  a.href = canvas.toDataURL("image/png"); a.click();

// ── 5. HISTORY ACCURACY CHART ────────────────────────
// ══════════════════════════════════════════════════════
function renderAccuracyChart(history) {
  const valid = (history||[]).filter(d=>d.top10HitRate!=null);
  if (valid.length < 3) return "";
  const w = 600, h = 120, pad = 30;
  const xStep = (w - pad * 2) / Math.max(valid.length - 1, 1);
  const maxY = 100, minY = 0;
  const scaleY = v => h - pad - ((v - minY) / (maxY - minY)) * (h - pad * 2);

  let path = "";
  valid.forEach((d, i) => {
    const x = pad + i * xStep;
    const y = scaleY(d.top10HitRate);
    path += (i === 0 ? "M" : "L") + `${x.toFixed(1)},${y.toFixed(1)} `;
  });

  // 50% reference line
  const y50 = scaleY(50);
  let svg = `<div class="acc-chart"><svg viewBox="0 0 ${w} ${h}" xmlns="http://www.w3.org/2000/svg">`;
  svg += `<line x1="${pad}" y1="${y50}" x2="${w-pad}" y2="${y50}" stroke="rgba(255,255,255,.08)" stroke-dasharray="4,4"/>`;
  svg += `<text x="${pad-4}" y="${y50+3}" fill="#3f3f46" font-size="8" text-anchor="end">50%</text>`;
  svg += `<path d="${path}" fill="none" stroke="#10b981" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>`;

  // Dots + labels
  valid.forEach((d, i) => {
    const x = pad + i * xStep;
    const y = scaleY(d.top10HitRate);
    const c = d.top10HitRate >= 50 ? "#10b981" : d.top10HitRate >= 30 ? "#f59e0b" : "#ef4444";
    svg += `<circle cx="${x}" cy="${y}" r="3" fill="${c}"/>`;
    if (i === 0 || i === valid.length - 1 || i % Math.ceil(valid.length / 6) === 0) {
      svg += `<text x="${x}" y="${h-6}" fill="#3f3f46" font-size="7" text-anchor="middle">${d.date.slice(5)}</text>`;
    }
  });
  svg += '</svg></div>';
  return svg;
}

let COMPARE_LIST = [];

function toggleCompare(name, team) {
  const idx = COMPARE_LIST.findIndex(c=>c.name===name&&c.team===team);
  if (idx >= 0) COMPARE_LIST.splice(idx, 1);
  else if (COMPARE_LIST.length < 3) COMPARE_LIST.push({name, team});
  applyFilters(); // re-render to update checkboxes
}

function showCompare() {
  if (COMPARE_LIST.length < 2) return;
  const players = COMPARE_LIST.map(c=>(DATA?.allPlayers||[]).find(p=>p.name===c.name&&p.team===c.team)).filter(Boolean);
  if (players.length < 2) return;

  const stats = [
    {l:"HRR",k:"hrr",f:v=>fmt(v)},{l:"Pick Score",k:"pickScore",f:v=>v?fmt(v):"—"},
    {l:"Confidence",k:"confidence",f:v=>v?v.toFixed(1):"—"},{l:"Tier",k:"tier",f:v=>v},
    {l:"AVG",k:"avg",f:v=>v?(v*1000|0)/1000:"—"},{l:"OPS",k:"ops",f:v=>v?v.toFixed(3):"—"},
    {l:"wRC+",k:"wrcPlus",f:v=>v||"—"},{l:"Barrel%",k:"barrelPct",f:v=>v!=null?v.toFixed(1)+"%":"—"},
    {l:"xwOBA",k:"xwoba",f:v=>v?v.toFixed(3):"—"},{l:"L10 AVG",k:"last10Avg",f:v=>v?(v*1000|0)/1000:"—"},
    {l:"Hit Streak",k:"hitStreak",f:v=>(v||0)+"G"},{l:"BvP AVG",k:"bvp",f:v=>v?v.avg.toFixed(3):"—"},
  ];

  const cols = players.length + 1;
  let h = `<button class="pp-close" onclick="closeCompare()">×</button>`;
  h += `<div style="font-weight:700;font-size:15px;margin-bottom:12px">Compare Players</div>`;
  h += `<div class="cmp-grid" style="grid-template-columns:100px repeat(${players.length},1fr)">`;
  h += `<div></div>`;
  players.forEach(p => h += `<div class="cmp-name" style="color:${p.tier==='A'?'var(--green)':p.tier==='B'?'var(--amber)':'var(--text)'}">${p.name}<br><span style="font-size:10px;color:var(--dim)">${p.team} ${p.pos} #${p.order}</span></div>`);

  stats.forEach(s => {
    h += `<div class="cmp-hdr">${s.l}</div>`;
    // Find best value for highlighting
    const vals = players.map(p => {
      const raw = s.k === "bvp" ? p.bvp : p[s.k];
      return typeof raw === "number" ? raw : (raw?.avg || 0);
    });
    const best = Math.max(...vals);
    players.forEach((p,i) => {
      const raw = s.k === "bvp" ? p.bvp : p[s.k];
      const numVal = typeof raw === "number" ? raw : (raw?.avg || 0);
      const isBest = numVal === best && best > 0 && players.length > 1;
      h += `<div class="cmp-val" style="${isBest?'color:var(--green)':''}">${s.f(raw)}</div>`;
    });
  });
  h += '</div>';

  $("compare-content").innerHTML = h;
  $("compare-modal").style.display = "flex";
}
function closeCompare() { $("compare-modal").style.display = "none"; }

// ══════════════════════════════════════════════════════
// ── 7. VALUE METRIC ──────────────────────────────────
// ══════════════════════════════════════════════════════
function computeValue(p, rank) {
  if (!p.pickScore || rank <= 0) return 0;
  return Math.round(p.pickScore / Math.sqrt(rank) * 100) / 100;
}

// ══════════════════════════════════════════════════════
// ── 8. CORRELATION WARNINGS (in Top Plays) ───────────
// ══════════════════════════════════════════════════════
function correlationWarnings(players) {
  const gameGroups = {};
  players.forEach(p => {
    const gm = DATA?.games?.find(g=>g.id===p.gameId);
    const label = gm ? `${gm.away?.abbr}@${gm.home?.abbr}` : "?";
    gameGroups[label] = (gameGroups[label]||0) + 1;
  });
  return Object.entries(gameGroups).filter(([,c])=>c>=3).map(([g,c])=>`⚠ ${c} picks in ${g} — high correlation`);
}

// ══════════════════════════════════════════════════════
// ── 12. DRAFTKINGS EXPORT ────────────────────────────
// ══════════════════════════════════════════════════════
function exportBook(book) {
  document.getElementById('export-dd').style.display='none';
  const players = MY_LINEUP.length ? MY_LINEUP : (DATA?.dailyTop10||[]).filter(p=>!p.isTBD);
  if (!players.length) return;

  const posMap = {P:"P",C:"C","1B":"1B","2B":"2B","3B":"3B",SS:"SS",LF:"OF",CF:"OF",RF:"OF",OF:"OF",DH:"UTIL"};
  const date = DATA?.date || new Date().toLocaleDateString("en-CA");
  let csv = "", filename = "";

  if (book === "dk") {
    // DraftKings format
    csv = "Position,Name + ID,Name,ID,Roster Position,Salary,Game Info,TeamAbbrev,AvgPointsPerGame\n";
    players.forEach(p => {
      const pos = posMap[p.pos] || "UTIL";
      const gm = DATA?.games?.find(g=>g.id===p.gameId);
      const gameInfo = gm ? `${gm.away?.abbr}@${gm.home?.abbr} ${gm.time||""}` : "";
      csv += `${pos},"${p.name}","${p.name}",,${pos},,${gameInfo},${p.team},${fmt(p.hrr)}\n`;
    });
    filename = `dk-lineup-${date}.csv`;
  }
  else if (book === "fd") {
    // FanDuel format
    csv = "Position,Nickname,FPPG,Played,Salary,Game,Team,Opponent,Injury Indicator,Injury Details\n";
    players.forEach(p => {
      const pos = posMap[p.pos] || "UTIL";
      const gm = DATA?.games?.find(g=>g.id===p.gameId);
      const opp = gm ? (p.team===gm.home?.abbr ? gm.away?.abbr : gm.home?.abbr) : "";
      const gameInfo = gm ? `${gm.away?.abbr}@${gm.home?.abbr}` : "";
      csv += `${pos},"${p.name}",${fmt(p.hrr)},,0,${gameInfo},${p.team},${opp},,\n`;
    });
    filename = `fd-lineup-${date}.csv`;
  }
  else if (book === "mgm") {
    // BetMGM format
    csv = "Player,Position,Team,Game,Projected HRR,Confidence,Pick Score,Tier\n";
    players.forEach(p => {
      const gm = DATA?.games?.find(g=>g.id===p.gameId);
      const gameInfo = gm ? `${gm.away?.abbr}@${gm.home?.abbr}` : "";
      csv += `"${p.name}",${p.pos},${p.team},${gameInfo},${fmt(p.hrr)},${p.confidence||""},${p.pickScore?fmt(p.pickScore):""},${p.tier}\n`;
    });
    filename = `betmgm-lineup-${date}.csv`;
  }
  else if (book === "fan") {
    // Fanatics Sportsbook format
    csv = "Player Name,Position,Team,Matchup,HRR Projection,Confidence Score,Tier,Batting Order\n";
    players.forEach(p => {
      const gm = DATA?.games?.find(g=>g.id===p.gameId);
      const matchup = gm ? `${gm.away?.abbr} @ ${gm.home?.abbr}` : "";
      csv += `"${p.name}",${p.pos},${p.team},"${matchup}",${fmt(p.hrr)},${p.confidence||""},${p.tier},${p.order}\n`;
    });
    filename = `fanatics-lineup-${date}.csv`;
  }
  else if (book === "b365") {
    // Bet365 format
    csv = "Name,Team,Position,Order,OPS,Projected HRR,Confidence,Pick Score\n";
    players.forEach(p => {
      const full = (DATA?.allPlayers||[]).find(x=>x.name===p.name&&x.team===p.team);
      csv += `"${p.name}",${p.team},${p.pos},${p.order},${full?(full.ops||0).toFixed(3):""},${fmt(p.hrr)},${p.confidence||""},${p.pickScore?fmt(p.pickScore):""}\n`;
    });
    filename = `bet365-lineup-${date}.csv`;
  }
  else {
    // Generic
    csv = "Name,Team,Position,Order,Bats,Projected HRR,Confidence,Pick Score,Tier,H Proj,R Proj,RBI Proj\n";
    players.forEach(p => {
      const full = (DATA?.allPlayers||[]).find(x=>x.name===p.name&&x.team===p.team);
      const bd = breakdown(p.hrr, p.order, p);
      csv += `"${p.name}",${p.team},${p.pos},${p.order},${full?.bats||""},${fmt(p.hrr)},${p.confidence||""},${p.pickScore?fmt(p.pickScore):""},${p.tier},${fmt(bd.h)},${fmt(bd.r)},${fmt(bd.rbi)}\n`;
    });
    filename = `hrr-lineup-${date}.csv`;
  }

  const a = document.createElement("a");
  a.href = "data:text/csv;charset=utf-8," + encodeURIComponent(csv);
  a.download = filename;
  a.click();
}
