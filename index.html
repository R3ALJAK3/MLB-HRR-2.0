<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>MLB HRR Dashboard</title>
<script defer src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script defer src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script defer src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  body { background: #08080a; color: white; font-family: sans-serif; padding: 20px; }
  .card { background: #111827; padding: 15px; border-radius: 10px; margin-bottom: 10px; border: 1px solid #222; display: flex; justify-content: space-between; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
  const { useState, useEffect } = React;
  const GIST = "https://gist.githubusercontent.com/R3ALJAK3/2b4a2e18268a955fd76247ca91156f94/raw/hrr-data.json";

  function App() {
    const [players, setPlayers] = useState([]);
    useEffect(() => {
      fetch(GIST).then(r => r.json()).then(d => setPlayers(d.allPlayers || []));
    }, []);

    return (
      <div>
        <h1>MLB HRR 2.0</h1>
        {players.filter(p => p.hrr > 1.4).map((p, i) => (
          <div key={i} className="card">
            <div><strong>{p.name}</strong><br/>{p.team}</div>
            <div style={{color: '#10b981', fontWeight: 'bold'}}>{p.hrr.toFixed(2)}</div>
          </div>
        ))}
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
