<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>MLB HRR Dashboard</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>tailwind.config={theme:{extend:{colors:{bg0:'#08080a',bg1:'#0e0e11',bg2:'#141418'}}}}</script>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script crossorigin src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@keyframes scaleIn{from{opacity:0;transform:scale(.97)}to{opacity:1;transform:scale(1)}}
@keyframes pulse2{0%,100%{opacity:1}50%{opacity:.3}}
@keyframes spin{to{transform:rotate(360deg)}}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body,#root{height:100%;overflow-x:hidden}
body{background:#08080a;color:#e4e4e7;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,sans-serif;font-size:14px}
::-webkit-scrollbar{width:6px;height:6px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:rgba(255,255,255,.08);border-radius:3px}
.tabular-nums{font-variant-numeric:tabular-nums}.scrollbar-none::-webkit-scrollbar{display:none}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const{useState,useEffect,useMemo,useCallback}=React;
const GIST="https://gist.githubusercontent.com/R3ALJAK3/2b4a2e18268a955fd76247ca91156f94/raw/hrr-data.json";
const MLBAPI="https://statsapi.mlb.com/api/v1";
const fmt=(n,d=2)=>((n)||0).toFixed(d);
const TIPS={AVG:"Season batting average",OPS:"On-base + slugging (.720=avg)",wRC:"Weighted runs created+ (100=avg)","Brl%":"% ideal exit velo + angle","HH%":"% batted balls 95+ mph",BvP:"Career avg vs today's pitcher",Conf:"Data completeness 1-10",HRR:"Hits+Runs+RBI projection",Pick:"HRR × confidence blend",Tier:"A≥3.20 · B≥2.50 · C<2.50",Diff:"Actual minus projected"};
const bd=(h,o,p)=>p?.hProj!=null?{h:p.hProj,r:p.rProj,rbi:p.rbiProj}:{h:0,r:0,rbi:0};

const Tier=({t})=>{const c=t==="A"?"bg-emerald-500/15 text-emerald-400":t==="B"?"bg-amber-500/15 text-amber-400":"bg-zinc-700/30 text-zinc-500";return<span className={`inline-flex items-center justify-center w-6 h-5 rounded text-[10px] font-bold ${c}`}>{t}</span>};
const ConfBar=({value:v=0})=>{const c=v>=9?"#10b981":v>=7?"#f59e0b":v>=5?"#f97316":"#ef4444";return<div className="flex items-center gap-1.5"><span style={{color:c}} className="text-xs font-semibold tabular-nums w-7 text-right">{v.toFixed(1)}</span><div className="relative h-[3px] w-10 bg-white/[.04] rounded-full overflow-hidden"><div style={{width:`${(v/10)*100}%`,background:c}} className="absolute inset-y-0 left-0 rounded-full transition-all duration-500"/></div></div>};
const StreakTag=({type:t})=>{if(t==="hot")return<span className="inline-flex items-center gap-0.5 text-[9px] font-bold bg-red-500/15 text-red-400 px-1.5 py-0.5 rounded ml-1">🔥HOT</span>;if(t==="warm")return<span className="text-[9px] font-bold bg-amber-500/15 text-amber-400 px-1.5 py-0.5 rounded ml-1">WARM</span>;if(t==="cold")return<span className="text-[9px] font-bold bg-blue-500/15 text-blue-400 px-1.5 py-0.5 rounded ml-1">❄COLD</span>;if(t==="cool")return<span className="text-[9px] font-bold bg-blue-500/15 text-blue-400 px-1.5 py-0.5 rounded ml-1">COOL</span>;return null};
const HandBadge=({h})=><span className={`text-[9px] font-bold px-1.5 py-0.5 rounded ${h==="L"?"bg-blue-500/15 text-blue-400":"bg-purple-500/15 text-purple-400"}`}>{h}HP</span>;
const InjBadge=()=><span className="text-[9px] font-bold bg-amber-500/15 text-amber-400 px-1.5 py-0.5 rounded ml-1">DTD</span>;
const Chip=({children})=><span className="text-[10px] font-semibold bg-white/[.06] text-zinc-400 px-1.5 py-0.5 rounded">{children}</span>;
const EnvBadge=({score:s})=>{if(!s)return null;const c=s>=7?"text-emerald-400 bg-emerald-500/10":s>=4?"text-amber-400 bg-amber-500/10":"text-blue-400 bg-blue-500/10";return<span className={`text-[10px] font-bold px-1.5 py-0.5 rounded tabular-nums ${c}`}>ENV {s}</span>};
const MetricCard=({label,value,sub,color,delay=0})=><div className="bg-zinc-900/60 border border-white/[.04] p-3.5 rounded-lg" style={{animation:`fadeUp 0.5s ease-out ${delay}s both`}}><div className="text-[10px] text-zinc-500 uppercase tracking-widest font-medium mb-1">{label}</div><div className="text-2xl font-bold tabular-nums" style={{color:color||"#e4e4e7"}}>{value}</div>{sub&&<div className="text-[10px] text-zinc-600 mt-0.5">{sub}</div>}</div>;
const Tooltip=({text,children})=>{const[s,setS]=useState(false);return<span className="relative inline-flex" onMouseEnter={()=>setS(true)} onMouseLeave={()=>setS(false)}>{children}{s&&text&&<span className="absolute bottom-full left-1/2 -translate-x-1/2 mb-1.5 px-2.5 py-1.5 bg-zinc-800 border border-white/10 text-[11px] text-zinc-200 rounded-md whitespace-normal max-w-[200px] z-50 pointer-events-none shadow-xl leading-relaxed">{text}</span>}</span>};
const Th=({children,tip,onClick,sorted,dir,className=""})=><th onClick={onClick} className={`text-left px-2 py-2 text-[9px] font-semibold text-zinc-500 uppercase tracking-wider border-b border-white/[.04] cursor-pointer hover:text-zinc-300 select-none whitespace-nowrap transition-colors ${className}`}><Tooltip text={tip}><span className="flex items-center gap-1">{children}{sorted&&(dir===-1?"↓":"↑")}</span></Tooltip></th>;
const PN=({p,onClick})=><span className="font-semibold text-zinc-100 hover:text-white cursor-pointer hover:underline decoration-zinc-600 underline-offset-2" onClick={e=>{e.stopPropagation();onClick(p)}}>{p.name}</span>;

// Player Modal
const Modal=({player:p,game:gm,onClose})=>{if(!p)return null;const sp=gm?(p.team===gm.home?.abbr?gm.away?.pitcher:gm.home?.pitcher):null;const b=bd(p.hrr,p.order,p);const cc=(p.confidence||0)>=9?"#10b981":(p.confidence||0)>=7?"#f59e0b":"#ef4444";const tc=p.tier==="A"?"#10b981":p.tier==="B"?"#f59e0b":"#52525b";
const S=({l,v,c})=><div className="bg-white/[.03] rounded-md p-2.5"><div className="text-[9px] text-zinc-500 uppercase tracking-wider">{l}</div><div className="text-sm font-bold tabular-nums mt-0.5" style={{color:c||"#e4e4e7"}}>{v}</div></div>;
const Sec=({t})=><div className="text-[10px] text-zinc-600 uppercase tracking-wider font-medium mt-4 mb-2 pt-3 border-t border-white/[.04]">{t}</div>;
return<div className="fixed inset-0 z-50 flex items-start justify-center pt-16 bg-black/60 backdrop-blur-sm" onClick={onClose}><div className="bg-zinc-900 border border-white/[.06] rounded-xl w-full max-w-md mx-4 max-h-[80vh] overflow-y-auto shadow-2xl" onClick={e=>e.stopPropagation()} style={{animation:"scaleIn 0.2s ease-out"}}><div className="p-5">
<div className="flex justify-between items-start mb-4"><div><div className="text-lg font-bold text-zinc-100 flex items-center gap-2 flex-wrap">{p.name}<StreakTag type={p.streakType}/>{p.injured&&<InjBadge/>}</div><div className="text-xs text-zinc-500 mt-1 flex items-center gap-2 flex-wrap"><Chip>{p.team}</Chip>{p.pos} · #{p.order} · {p.bats}H · {p.isHome?"Home":"Away"}{gm&&` · ${gm.time} ET`}</div></div><button onClick={onClose} className="text-zinc-500 hover:text-zinc-200 transition text-lg px-1">✕</button></div>
<div className="grid grid-cols-3 gap-2 mb-1"><S l="HRR" v={fmt(p.hrr)} c={tc}/><S l="Confidence" v={p.confidence?.toFixed(1)||"—"} c={cc}/><S l="Pick Score" v={p.pickScore?fmt(p.pickScore):"—"}/><S l="H Proj" v={fmt(b.h)} c="#10b981"/><S l="R Proj" v={fmt(b.r)} c="#3b82f6"/><S l="RBI Proj" v={fmt(b.rbi)} c="#f59e0b"/></div>
<Sec t="Season"/><div className="grid grid-cols-3 gap-2"><S l="AVG" v={p.avg?(p.avg*1000|0)/1000:"—"}/><S l="OPS" v={(p.ops||0).toFixed(3)}/><S l="wRC+" v={p.wrcPlus||"—"}/><S l="xwOBA" v={p.xwoba?p.xwoba.toFixed(3):"—"}/><S l="Barrel%" v={p.barrelPct!=null?p.barrelPct.toFixed(1)+"%":"—"}/><S l="HardHit%" v={p.hardHitPct!=null?p.hardHitPct.toFixed(1)+"%":"—"}/></div>
<Sec t="Recent form"/><div className="grid grid-cols-3 gap-2"><S l="L10 AVG" v={p.last10Avg?(p.last10Avg*1000|0)/1000:"—"} c={p.streakType==="hot"?"#10b981":p.streakType==="cold"?"#3b82f6":undefined}/><S l="L10 AB" v={p.last10AB||"—"}/><S l="Hit Streak" v={`${p.hitStreak||0}G`}/></div>
{sp&&<><Sec t="Matchup"/><div className="text-xs text-zinc-400 mb-2">vs <span className="text-zinc-200 font-semibold">{sp.name}</span> <HandBadge h={sp.hand}/> · {fmt(sp.era)} ERA{sp.last3ERA!=null&&<span style={{color:sp.last3ERA<3.5?"#10b981":sp.last3ERA>5?"#ef4444":"#a1a1aa"}}> · L3: {sp.last3ERA.toFixed(2)}</span>}</div>
<div className="grid grid-cols-3 gap-2"><S l="BvP AVG" v={p.bvp?p.bvp.avg.toFixed(3):"—"} c={p.bvp?.avg>=.3?"#10b981":p.bvp?.avg<.2?"#ef4444":undefined}/><S l="BvP AB" v={p.bvp?p.bvp.ab:"—"}/><S l="Platoon" v={(p.bats==="L"&&sp.hand==="R"||p.bats==="R"&&sp.hand==="L")?"Fav":"Same"} c={(p.bats==="L"&&sp.hand==="R"||p.bats==="R"&&sp.hand==="L")?"#10b981":"#f59e0b"}/></div></>}
{gm&&<><Sec t="Environment"/><div className="grid grid-cols-3 gap-2"><S l="Env Score" v={gm.envScore||"—"} c={(gm.envScore||5)>=7?"#10b981":(gm.envScore||5)>=4?"#f59e0b":"#3b82f6"}/><S l="Park Factor" v={`${(gm.parkFactor||1).toFixed(2)}×`}/><S l="Impl Runs" v={p.impliedRuns?p.impliedRuns.toFixed(1):"—"}/></div></>}
</div></div></div>};

// Top Plays
const TopPlays=({data:d,onSelect:sel})=>{const top=d.dailyTop10||[];const real=top.filter(p=>!p.isTBD&&p.name!=="Lineup TBD");const gWL=(d.games||[]).filter(g=>g.awayLineupAvailable||g.homeLineupAvailable).length;const tG=(d.games||[]).length;const ac=real.length?Math.round(real.reduce((s,p)=>s+(p.confidence||0),0)/real.length*10)/10:0;
return<div><div className="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-5 gap-2 mb-4"><MetricCard label="Picks" value={real.length} delay={0}/><MetricCard label="Avg Confidence" value={ac} color={ac>=9?"#10b981":ac>=7?"#f59e0b":"#ef4444"} delay={.05}/><MetricCard label="Top HRR" value={real.length?fmt(real[0]?.hrr):"—"} delay={.1}/><MetricCard label="Lineups" value={`${gWL}/${tG}`} color={gWL===tG?"#10b981":"#f59e0b"} delay={.15}/><MetricCard label="Games" value={tG} delay={.2}/></div>
{!real.length?<div className="text-center py-16 text-zinc-500"><div className="text-sm">No picks meet confidence ≥ 9.0 yet</div><div className="text-xs text-zinc-600 mt-1">{gWL}/{tG} lineups confirmed</div></div>
:<div className="bg-zinc-900/40 border border-white/[.04] rounded-lg overflow-x-auto"><table className="w-full text-xs min-w-[900px]"><thead><tr className="border-b border-white/[.06]"><th className="px-2 py-2.5 text-[9px] text-zinc-600 font-medium uppercase tracking-wider text-left w-8">#</th><th className="px-2 py-2.5 text-[9px] text-zinc-600 font-medium uppercase tracking-wider text-left">Player</th><th className="px-2 py-2.5 text-[9px] text-zinc-600 font-medium uppercase tracking-wider text-left">Opp SP</th><Th tip={TIPS.AVG}>AVG</Th><Th tip={TIPS.OPS}>OPS</Th><Th tip={TIPS.wRC}>wRC+</Th><Th tip={TIPS["Brl%"]}>Brl%</Th><Th tip={TIPS.BvP}>BvP</Th><Th tip={TIPS.Conf}>Conf</Th><th className="px-2 py-2.5 text-[9px] text-zinc-600 text-center">H</th><th className="px-2 py-2.5 text-[9px] text-zinc-600 text-center">R</th><th className="px-2 py-2.5 text-[9px] text-zinc-600 text-center">RBI</th><Th tip={TIPS.HRR}>HRR</Th><Th tip={TIPS.Pick}>Pick</Th><Th tip={TIPS.Tier}>Tier</Th></tr></thead>
<tbody>{real.map((p,i)=>{const gm=d.games?.find(g=>g.id===p.gameId);const sp=gm?(p.team===gm.home?.abbr?gm.away?.pitcher:gm.home?.pitcher):null;const b2=bd(p.hrr,p.order,p);
return<tr key={p.name+p.team} className="border-b border-white/[.02] hover:bg-white/[.02] transition-colors" style={{animation:`fadeUp 0.4s ease-out ${i*.04}s both`}}>
<td className="px-2 py-2 tabular-nums text-zinc-600">{i+1}</td>
<td className="px-2 py-2"><div className="flex items-center gap-1.5"><PN p={p} onClick={sel}/><StreakTag type={p.streakType}/>{p.injured&&<InjBadge/>}</div><div className="text-[10px] text-zinc-600 mt-0.5"><Chip>{p.team}</Chip> {p.pos} #{p.order}{p.isHome?" · Home":""}</div></td>
<td className="px-2 py-2 text-zinc-500">{sp?<><span className="text-zinc-300">{sp.name}</span> <HandBadge h={sp.hand}/>{sp.last3ERA!=null&&<span className="text-[10px] ml-1" style={{color:sp.last3ERA<3.5?"#10b981":sp.last3ERA>5?"#ef4444":"#71717a"}}>L3:{sp.last3ERA.toFixed(1)}</span>}</>:"—"}</td>
<td className="px-2 py-2 tabular-nums text-zinc-400">{p.avg?(p.avg*1000|0)/1000:"—"}</td><td className="px-2 py-2 tabular-nums text-zinc-400">{(p.ops||0).toFixed(3)}</td><td className="px-2 py-2 tabular-nums text-zinc-400">{p.wrcPlus||"—"}</td><td className="px-2 py-2 tabular-nums text-zinc-400">{p.barrelPct!=null?p.barrelPct.toFixed(1):"—"}</td>
<td className="px-2 py-2 tabular-nums" style={{color:p.bvp?.avg>=.3?"#10b981":p.bvp?.avg<.2?"#ef4444":"#71717a"}}>{p.bvp?p.bvp.avg.toFixed(3):"—"}<span className="text-zinc-600 text-[9px] ml-0.5">{p.bvp?`(${p.bvp.ab})`:""}</span></td>
<td className="px-2 py-2"><ConfBar value={p.confidence}/></td>
<td className="px-2 py-2 tabular-nums text-emerald-400/80 text-center">{fmt(b2.h)}</td><td className="px-2 py-2 tabular-nums text-blue-400/80 text-center">{fmt(b2.r)}</td><td className="px-2 py-2 tabular-nums text-amber-400/80 text-center">{fmt(b2.rbi)}</td>
<td className="px-2 py-2 tabular-nums font-bold text-zinc-100 text-sm">{fmt(p.hrr)}</td><td className="px-2 py-2 tabular-nums text-zinc-500">{p.pickScore?fmt(p.pickScore):"—"}</td><td className="px-2 py-2"><Tier t={p.tier}/></td>
</tr>})}</tbody></table></div>}
<div className="text-[10px] text-zinc-600 mt-2">Filtered by confidence ≥ 9.0 · Ranked by pick score</div></div>};

// All Players
const AllPlayers=({data:d,onSelect:sel})=>{const[search,setSearch]=useState("");const[sk,setSk]=useState("pickScore");const[sd,setSd]=useState(-1);const[tf,setTf]=useState("");const[tierF,setTierF]=useState("");
const teams=useMemo(()=>[...new Set((d.allPlayers||[]).map(p=>p.team))].sort(),[d]);
const players=useMemo(()=>{let a=[...(d.allPlayers||[])];if(search)a=a.filter(p=>p.name.toLowerCase().includes(search.toLowerCase())||p.team?.toLowerCase().includes(search.toLowerCase()));if(tf)a=a.filter(p=>p.team===tf);if(tierF)a=a.filter(p=>p.tier===tierF);a.sort((x,y)=>{const av=x[sk],bv=y[sk];return typeof av==="string"?av.localeCompare(bv)*sd:((bv||0)-(av||0))*-sd});return a},[d,search,sk,sd,tf,tierF]);
const toggle=k=>{sk===k?setSd(x=>x*-1):(setSk(k),setSd(-1))};
const cols=[{k:"name",l:"Player"},{k:"team",l:"Team"},{k:"order",l:"#"},{k:"avg",l:"AVG",tip:TIPS.AVG},{k:"ops",l:"OPS",tip:TIPS.OPS},{k:"wrcPlus",l:"wRC+",tip:TIPS.wRC},{k:"barrelPct",l:"Brl%",tip:TIPS["Brl%"]},{k:"confidence",l:"Conf",tip:TIPS.Conf},{k:"hrr",l:"HRR",tip:TIPS.HRR},{k:"pickScore",l:"Pick",tip:TIPS.Pick},{k:"tier",l:"Tier",tip:TIPS.Tier}];
const csv=()=>{const rows=players.map(p=>{const b2=bd(p.hrr,p.order,p);return`"${p.name}",${p.team},${p.pos},${p.order},${(p.ops||0).toFixed(3)},${p.wrcPlus||0},${p.confidence||""},${fmt(b2.h)},${fmt(b2.r)},${fmt(b2.rbi)},${fmt(p.hrr)},${p.pickScore?fmt(p.pickScore):""},${p.tier}`});const c=["Player,Team,Pos,Ord,OPS,wRC+,Conf,H,R,RBI,HRR,Pick,Tier",...rows].join("\n");const a=document.createElement("a");a.href="data:text/csv;charset=utf-8,"+encodeURIComponent(c);a.download="hrr-"+(d.date||"today")+".csv";a.click()};
return<div><div className="flex flex-wrap items-center gap-2 mb-3"><div className="relative"><input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search..." className="bg-zinc-900 border border-white/[.06] rounded-md pl-3 pr-3 py-1.5 text-xs text-zinc-200 outline-none focus:border-zinc-600 w-40 placeholder:text-zinc-600"/></div>
<select value={tf} onChange={e=>setTf(e.target.value)} className="bg-zinc-900 border border-white/[.06] rounded-md px-2 py-1.5 text-xs text-zinc-400 outline-none"><option value="">All Teams</option>{teams.map(t=><option key={t}>{t}</option>)}</select>
<select value={tierF} onChange={e=>setTierF(e.target.value)} className="bg-zinc-900 border border-white/[.06] rounded-md px-2 py-1.5 text-xs text-zinc-400 outline-none"><option value="">All Tiers</option><option>A</option><option>B</option><option>C</option></select>
<button onClick={csv} className="bg-zinc-900 border border-white/[.06] rounded-md px-3 py-1.5 text-xs text-zinc-400 hover:text-zinc-200 transition">Export CSV</button>
<span className="text-[10px] text-zinc-600 ml-auto">{players.length} players</span></div>
<div className="bg-zinc-900/40 border border-white/[.04] rounded-lg overflow-x-auto"><table className="w-full text-xs min-w-[700px]"><thead><tr className="border-b border-white/[.06]">{cols.map(c=><Th key={c.k} tip={c.tip} onClick={()=>toggle(c.k)} sorted={sk===c.k} dir={sd}>{c.l}</Th>)}</tr></thead>
<tbody>{players.slice(0,100).map((p,i)=><tr key={p.name+p.team+i} className="border-b border-white/[.02] hover:bg-white/[.02] transition-colors cursor-pointer" onClick={()=>sel(p)}>
<td className="px-2 py-1.5"><PN p={p} onClick={sel}/><StreakTag type={p.streakType}/></td><td className="px-2 py-1.5"><Chip>{p.team}</Chip></td><td className="px-2 py-1.5 tabular-nums text-zinc-500">{p.order}</td>
<td className="px-2 py-1.5 tabular-nums text-zinc-400">{p.avg?(p.avg*1000|0)/1000:"—"}</td><td className="px-2 py-1.5 tabular-nums text-zinc-400">{(p.ops||0).toFixed(3)}</td><td className="px-2 py-1.5 tabular-nums text-zinc-400">{p.wrcPlus||"—"}</td><td className="px-2 py-1.5 tabular-nums text-zinc-400">{p.barrelPct!=null?p.barrelPct.toFixed(1):"—"}</td>
<td className="px-2 py-1.5"><ConfBar value={p.confidence}/></td><td className="px-2 py-1.5 tabular-nums font-bold text-zinc-100">{fmt(p.hrr)}</td><td className="px-2 py-1.5 tabular-nums text-zinc-500">{p.pickScore?fmt(p.pickScore):"—"}</td><td className="px-2 py-1.5"><Tier t={p.tier}/></td>
</tr>)}</tbody></table></div></div>};

// Game Slate
const GameSlate=({data:d,onSelect:sel})=>{const games=d.games||[];
return<div className="grid grid-cols-1 gap-3">{games.map((g,gi)=>{const ap=(d.allPlayers||[]).filter(p=>p.team===g.away?.abbr&&p.gameId===g.id).sort((a,b)=>a.order-b.order);const hp=(d.allPlayers||[]).filter(p=>p.team===g.home?.abbr&&p.gameId===g.id).sort((a,b)=>a.order-b.order);
const LR=({p})=>{if(!p||p.name==="Lineup TBD")return null;const tc=p.tier==="A"?"text-emerald-400":p.tier==="B"?"text-amber-400":"text-zinc-500";return<div className={`grid grid-cols-[16px_1fr_28px_36px_36px_36px_40px] gap-1 items-center py-0.5 px-1 rounded text-[11px] hover:bg-white/[.02] cursor-pointer ${p.tier==="A"?"bg-emerald-500/[.03]":""}`} onClick={()=>sel(p)}><span className="tabular-nums text-zinc-600 text-[10px]">{p.order}</span><span className={`truncate ${tc} font-medium`}>{p.name}</span><span className="text-zinc-600 text-center text-[10px]">{p.pos}</span><span className={`tabular-nums text-right ${tc}`}>{p.hProj?fmt(p.hProj):"—"}</span><span className={`tabular-nums text-right ${tc}`}>{p.rProj?fmt(p.rProj):"—"}</span><span className={`tabular-nums text-right ${tc}`}>{p.rbiProj?fmt(p.rbiProj):"—"}</span><span className={`tabular-nums text-right font-semibold ${tc}`}>{fmt(p.hrr)}</span></div>};
const Side=({side,lineup})=>{const pitcher=g[side]?.pitcher;const tbd=lineup.length===0;return<div><div className="text-[10px] font-semibold text-zinc-500 uppercase tracking-wider pb-1.5 mb-1.5 border-b border-white/[.04]">{g[side]?.name}</div>
{pitcher&&<div className="text-[11px] text-zinc-500 mb-2"><span className="text-zinc-300 font-medium">{pitcher.name}</span> <HandBadge h={pitcher.hand}/><span className="ml-1">{fmt(pitcher.era)} ERA · {pitcher.k9} K/9</span>{pitcher.last3ERA!=null&&<span style={{color:pitcher.last3ERA<3.5?"#10b981":pitcher.last3ERA>5?"#ef4444":"#71717a"}}> · L3: {pitcher.last3ERA.toFixed(2)}</span>}</div>}
{tbd?<div className="text-center py-4 text-zinc-600 text-[11px] border border-dashed border-white/[.06] rounded-md">Awaiting lineup</div>:<><div className="grid grid-cols-[16px_1fr_28px_36px_36px_36px_40px] gap-1 px-1 text-[9px] text-zinc-600 uppercase mb-0.5"><span></span><span>Player</span><span className="text-center">Pos</span><span className="text-right">H</span><span className="text-right">R</span><span className="text-right">RBI</span><span className="text-right">HRR</span></div>{lineup.map(p=><LR key={p.name} p={p}/>)}</>}</div>};
return<div key={g.id} className="bg-zinc-900/40 border border-white/[.04] rounded-lg p-4" style={{animation:`fadeUp 0.4s ease-out ${gi*.05}s both`}}><div className="flex justify-between items-start gap-2 mb-3 flex-wrap"><div><div className="text-base font-bold text-zinc-100">{g.away?.abbr} <span className="text-zinc-600 font-normal">@</span> {g.home?.abbr}</div><div className="text-[10px] text-zinc-600 mt-0.5">{g.time} ET · {g.stadium}</div></div><div className="text-right text-[10px] tabular-nums text-zinc-500 flex flex-wrap gap-1.5 items-center"><EnvBadge score={g.envScore}/><span>PF {(g.parkFactor||1).toFixed(2)}×</span>{g.weatherNote&&<span>{g.weatherNote}</span>}{g.oddsLine&&<span className="text-amber-400">O/U {g.oddsLine.total}</span>}</div></div>
<div className="grid grid-cols-1 md:grid-cols-2 gap-4"><Side side="away" lineup={ap}/><Side side="home" lineup={hp}/></div></div>})}</div>};

// Live, Results, Stacks, History
const LiveScores=({live})=>{const[exp,setExp]=useState({});const[bs,setBs]=useState({});const games=Object.values(live);if(!games.length)return<div className="text-center py-16 text-zinc-500 text-sm">Checking scores...</div>;
const gr={live:[],final:[],upcoming:[]};games.forEach(g=>{const st=g.status?.abstractGameState;if(st==="Live")gr.live.push(g);else if(st==="Final")gr.final.push(g);else gr.upcoming.push(g)});
const toggle=async pk=>{if(exp[pk]){setExp(e=>({...e,[pk]:false}));return}setExp(e=>({...e,[pk]:true}));if(!bs[pk]){try{const r=await fetch(`${MLBAPI}/game/${pk}/boxscore`);setBs(c=>({...c,[pk]:await r.json()}))}catch{}}};
const BS=({pk})=>{const d=bs[pk];if(!d)return<div className="text-xs text-zinc-600 py-2">Loading...</div>;return["away","home"].map(side=>{const td=d.teams?.[side];if(!td)return null;const batters=td.battingOrder||[];const players=td.players||{};
return<div key={side} className="mt-2"><div className="text-[10px] font-semibold text-zinc-400 mb-1">{td.team?.abbreviation}</div><table className="w-full text-[11px]"><thead><tr className="text-[9px] text-zinc-600"><th className="text-left px-1 py-1">Player</th><th className="text-center px-1 py-1">AB</th><th className="text-center px-1 py-1">R</th><th className="text-center px-1 py-1">H</th><th className="text-center px-1 py-1">RBI</th><th className="text-center px-1 py-1">HR</th><th className="text-center px-1 py-1">BB</th><th className="text-center px-1 py-1">K</th><th className="text-center px-1 py-1 text-emerald-400">HRR</th></tr></thead>
<tbody>{batters.map(id=>{const p=players["ID"+id];if(!p)return null;const s=p.stats?.batting;if(!s)return null;const hrr=(parseInt(s.hits||0))+(parseInt(s.runs||0))+(parseInt(s.rbi||0));
return<tr key={id} className="border-t border-white/[.02]"><td className="px-1 py-0.5 font-medium text-zinc-300">{p.person?.fullName}<span className="text-zinc-600 text-[9px] ml-1">{p.position?.abbreviation}</span></td><td className="text-center tabular-nums px-1">{s.atBats||0}</td><td className="text-center tabular-nums px-1">{s.runs||0}</td><td className="text-center tabular-nums px-1">{s.hits||0}</td><td className="text-center tabular-nums px-1">{s.rbi||0}</td><td className="text-center tabular-nums px-1">{s.homeRuns||0}</td><td className="text-center tabular-nums px-1">{s.baseOnBalls||0}</td><td className="text-center tabular-nums px-1">{s.strikeOuts||0}</td><td className="text-center tabular-nums px-1 font-bold" style={{color:hrr>=3?"#10b981":hrr>=2?"#f59e0b":"#71717a"}}>{hrr}</td></tr>})}</tbody></table></div>})};
const Sec=({label,color,list})=>!list.length?null:<div className="mb-4"><div className="text-[10px] font-semibold uppercase tracking-wider mb-2" style={{color}}>{label}</div>{list.map(g=>{const aa=g.teams?.away?.team?.abbreviation||"?",ha=g.teams?.home?.team?.abbreviation||"?";const ar=g.teams?.away?.score??"—",hr=g.teams?.home?.score??"—";const ls=g.linescore;const st=g.status?.abstractGameState;const ce=st==="Live"||st==="Final";
return<div key={g.gamePk} className={`bg-zinc-900/40 border rounded-lg p-3 mb-2 ${ce?"cursor-pointer":""} ${st==="Live"?"border-emerald-500/20":"border-white/[.04]"} hover:border-white/[.08] transition`} onClick={()=>ce&&toggle(g.gamePk)}>
<div className="flex justify-between items-center"><div><span className="font-bold text-zinc-100 text-sm">{aa} @ {ha}</span>{ce&&<span className="text-[9px] text-zinc-600 ml-1.5">{exp[g.gamePk]?"▲":"▼"}</span>}<div className="text-[10px] text-zinc-600">{g.venue?.name}</div></div>
<div className="text-right"><span className="text-xl font-bold tabular-nums text-zinc-100">{ar} – {hr}</span><div className="text-[10px] mt-0.5">{st==="Live"?<span className="text-emerald-400 font-semibold">{ls?.currentInningOrdinal} {ls?.inningHalf==="Top"?"▲":"▼"}</span>:st==="Final"?<span className="text-zinc-500">Final</span>:<span className="text-zinc-500">{new Date(g.gameDate).toLocaleTimeString("en-US",{hour:"numeric",minute:"2-digit",timeZone:"America/New_York"})}</span>}</div></div></div>
{exp[g.gamePk]&&<div className="mt-2 pt-2 border-t border-white/[.04]"><BS pk={g.gamePk}/></div>}</div>})}</div>;
return<div><Sec label="In Progress" color="#10b981" list={gr.live}/><Sec label="Final" color="#71717a" list={gr.final}/><Sec label="Upcoming" color="#71717a" list={gr.upcoming}/></div>};

const Results=({data:d,live})=>{const[rows,setRows]=useState(null);useEffect(()=>{const fin=Object.values(live).filter(g=>g.status?.abstractGameState==="Final");if(!fin.length){setRows([]);return}(async()=>{const r=[];for(const g of fin){try{const res=await fetch(`${MLBAPI}/game/${g.gamePk}/boxscore`);const bs=await res.json();for(const side of["away","home"]){const td=bs.teams?.[side];if(!td)continue;const abbr=td.team?.abbreviation;for(const p of Object.values(td.players||{})){const s=p.stats?.batting;if(!s||(s.atBats||0)===0)continue;const actual=parseInt(s.hits||0)+parseInt(s.runs||0)+parseInt(s.rbi||0);const fn=p.person?.fullName||"?";const norm=n=>n.normalize("NFD").replace(/[\u0300-\u036f]/g,"").toLowerCase();let proj=d?.allPlayers?.find(pl=>pl.name===fn&&pl.team===abbr);if(!proj)proj=d?.allPlayers?.find(pl=>norm(pl.name)===norm(fn)&&pl.team===abbr);r.push({name:fn,abbr,hits:parseInt(s.hits||0),runs:parseInt(s.runs||0),rbi:parseInt(s.rbi||0),actual,proj:proj?.hrr??null,tier:proj?.tier||null})}}}catch{}}r.sort((a,b)=>b.actual-a.actual);setRows(r)})()},[live,d]);
if(rows===null)return<div className="text-center py-16 text-zinc-500 text-sm">Loading...</div>;if(!rows.length)return<div className="text-center py-16 text-zinc-500 text-sm">Results appear once games finish</div>;
const proj=rows.filter(r=>r.proj!==null);const hitRate=proj.length?Math.round(proj.filter(r=>r.actual>=Math.round(r.proj)).length/proj.length*1000)/10:0;const avgDiff=proj.length?Math.round(proj.reduce((s,r)=>s+(r.actual-r.proj),0)/proj.length*100)/100:0;
return<div><div className="grid grid-cols-2 sm:grid-cols-4 gap-2 mb-4"><MetricCard label="Hit Rate" value={`${hitRate}%`} color={hitRate>=50?"#10b981":"#f59e0b"}/><MetricCard label="Avg Diff" value={`${avgDiff>=0?"+":""}${avgDiff}`} color={avgDiff>=0?"#10b981":"#ef4444"} delay={.05}/><MetricCard label="Top 3 Actual" value={rows.slice(0,3).reduce((s,r)=>s+r.actual,0)} delay={.1}/><MetricCard label="Projected" value={`${proj.length}/${rows.length}`} delay={.15}/></div>
<div className="bg-zinc-900/40 border border-white/[.04] rounded-lg overflow-x-auto"><table className="w-full text-xs"><thead><tr className="border-b border-white/[.06]"><Th>Player</Th><Th>Team</Th><Th>Tier</Th><th className="px-2 py-2 text-[9px] text-zinc-600 text-center">H</th><th className="px-2 py-2 text-[9px] text-zinc-600 text-center">R</th><th className="px-2 py-2 text-[9px] text-zinc-600 text-center">RBI</th><Th>Actual</Th><Th>Projected</Th><Th tip={TIPS.Diff}>Diff</Th></tr></thead>
<tbody>{rows.map((r,i)=>{const diff=r.proj!==null?Math.round((r.actual-r.proj)*100)/100:null;return<tr key={r.name+i} className={`border-b border-white/[.02] ${r.actual>=3?"bg-emerald-500/[.03]":""}`}><td className="px-2 py-1.5 font-medium text-zinc-200">{r.name}</td><td className="px-2 py-1.5"><Chip>{r.abbr}</Chip></td><td className="px-2 py-1.5">{r.tier?<Tier t={r.tier}/>:<span className="text-zinc-600">—</span>}</td><td className="px-2 py-1.5 tabular-nums text-center">{r.hits}</td><td className="px-2 py-1.5 tabular-nums text-center">{r.runs}</td><td className="px-2 py-1.5 tabular-nums text-center">{r.rbi}</td><td className="px-2 py-1.5 tabular-nums font-bold" style={{color:r.actual>=3?"#10b981":r.actual>=2?"#f59e0b":"#71717a"}}>{r.actual}</td><td className="px-2 py-1.5 tabular-nums text-zinc-500">{r.proj!==null?fmt(r.proj):"—"}</td><td className="px-2 py-1.5 tabular-nums font-semibold" style={{color:diff!=null?(diff>=0?"#10b981":"#ef4444"):"#3f3f46"}}>{diff!=null?`${diff>=0?"+":""}${diff}`:"—"}</td></tr>})}</tbody></table></div></div>};

const Stacks=({data:d})=>{const SS=({title,stacks,sub})=>{if(!stacks?.length)return null;return<div className="mb-6"><div className="text-xs font-semibold text-zinc-400 mb-2">{title}{sub&&<span className="text-zinc-600 font-normal ml-2">{sub}</span>}</div>{stacks.map((s,i)=><div key={i} className="bg-zinc-900/40 border border-white/[.04] rounded-lg p-3 mb-2 flex items-center gap-3 flex-wrap" style={{animation:`fadeUp 0.3s ease-out ${i*.04}s both`}}><span className="text-zinc-600 tabular-nums text-xs w-5">{i+1}</span><div className="min-w-[60px]"><Chip>{s.team||`${s.away}@${s.home}`}</Chip><div className="text-[10px] text-zinc-600 mt-0.5">{s.opp?`vs ${s.opp} · `:""}{s.time}{s.impliedRuns?` · ${s.impliedRuns.toFixed(1)} impl`:""}</div></div><div className="flex-1 flex items-center gap-1 flex-wrap text-xs">{(s.players||[]).map((p,j)=><span key={j}><span style={{color:p.tier==="A"?"#10b981":p.tier==="B"?"#f59e0b":"#e4e4e7"}}>{p.name}</span><span className="tabular-nums text-zinc-600 ml-0.5">{fmt(p.hrr)}</span>{j<s.players.length-1&&<span className="text-zinc-700 mx-1">+</span>}</span>)}</div><span className="tabular-nums text-base font-bold text-emerald-400">{(s.total||s.stackTotal||0).toFixed(2)}</span></div>)}</div>};
return<div><SS title="2-Player Stacks" stacks={d.stacks2}/><SS title="3-Player Stacks" stacks={d.stacks3}/><SS title="Game Stacks" stacks={d.gameStacks} sub="Both teams in O/U 9+ games"/></div>};

const History=({data:d})=>{const[open,setOpen]=useState({});const h=d?.accuracyHistory||[];if(!h.length)return<div className="text-center py-16 text-zinc-500"><div className="text-sm">No historical data yet</div><div className="text-xs text-zinc-600 mt-1">History builds as each day completes</div></div>;
return<div>{[...h].reverse().map((day,i)=>{const isO=open[day.date];return<div key={day.date} className="bg-zinc-900/40 border border-white/[.04] rounded-lg p-3 mb-2 cursor-pointer hover:border-white/[.08] transition" onClick={()=>setOpen(o=>({...o,[day.date]:!o[day.date]}))}>
<div className="flex justify-between items-center"><div><span className="font-bold text-zinc-100 text-sm">{day.date}</span><span className="text-[9px] text-zinc-600 ml-1.5">{isO?"▲":"▼"}</span><div className="text-[10px] text-zinc-600">{day.gamesCompleted} games</div></div>
<div className="flex items-center gap-4"><div className="text-center"><div className="text-[9px] text-zinc-600">Hit%</div><div className="text-sm font-bold tabular-nums" style={{color:day.top10HitRate>=50?"#10b981":day.top10HitRate>=30?"#f59e0b":"#ef4444"}}>{day.top10HitRate!=null?day.top10HitRate+"%":"—"}</div></div><div className="text-center"><div className="text-[9px] text-zinc-600">Diff</div><div className="text-sm font-bold tabular-nums" style={{color:(day.top10AvgDiff||0)>=0?"#10b981":"#ef4444"}}>{day.top10AvgDiff!=null?`${day.top10AvgDiff>=0?"+":""}${day.top10AvgDiff}`:"—"}</div></div></div></div>
{isO&&day.top10?.length>0&&<div className="mt-2 pt-2 border-t border-white/[.04]"><table className="w-full text-[11px]"><thead><tr className="text-[9px] text-zinc-600"><th className="text-left px-1 py-1">#</th><th className="text-left px-1 py-1">Player</th><th className="text-left px-1 py-1">Team</th><th className="text-right px-1 py-1">HRR</th><th className="text-center px-1 py-1">Tier</th><th className="text-center px-1 py-1">Actual</th><th className="text-center px-1 py-1">Result</th></tr></thead><tbody>{day.top10.map((p,j)=>{const hit=p.actual!=null?p.actual>=Math.round(p.hrr):null;return<tr key={j} className="border-t border-white/[.02]" style={{background:hit===true?"rgba(16,185,129,.05)":hit===false?"rgba(239,68,68,.05)":"transparent"}}><td className="px-1 py-0.5 tabular-nums text-zinc-600">{j+1}</td><td className="px-1 py-0.5 text-zinc-300">{p.name}</td><td className="px-1 py-0.5"><Chip>{p.team}</Chip></td><td className="px-1 py-0.5 tabular-nums text-right font-semibold">{fmt(p.hrr)}</td><td className="px-1 py-0.5 text-center"><Tier t={p.tier}/></td><td className="px-1 py-0.5 tabular-nums text-center font-bold" style={{color:p.actual>=3?"#10b981":p.actual>=2?"#f59e0b":"#71717a"}}>{p.actual!=null?p.actual:"—"}</td><td className="px-1 py-0.5 text-center">{hit===true?<span className="text-emerald-400 font-bold">✓</span>:hit===false?<span className="text-red-400 font-bold">✗</span>:"—"}</td></tr>})}</tbody></table></div>}
</div>})}</div>};

// App Shell
const TABS=[{id:"top",l:"Top Plays"},{id:"slate",l:"Game Slate"},{id:"all",l:"All Players"},{id:"stacks",l:"Stacks"},{id:"history",l:"History"},{id:"live",l:"Live"},{id:"results",l:"Results"}];
function App(){const[data,setData]=useState(null);const[live,setLive]=useState({});const[tab,setTab]=useState("top");const[sel,setSel]=useState(null);const[loading,setLoading]=useState(true);const[err,setErr]=useState(null);
const fetchD=useCallback(async()=>{try{const r=await fetch(GIST+"?t="+Date.now());if(!r.ok)throw new Error("HTTP "+r.status);setData(await r.json());setErr(null)}catch(e){setErr(e.message)}setLoading(false)},[]);
const fetchL=useCallback(async()=>{try{const today=new Date().toLocaleDateString("en-CA",{timeZone:"America/New_York"});const r=await fetch(`${MLBAPI}/schedule?sportId=1&date=${today}&hydrate=team,linescore`);const d=await r.json();const m={};(d.dates?.[0]?.games||[]).forEach(g=>m[g.gamePk]=g);setLive(m)}catch{}},[]);
useEffect(()=>{fetchD();fetchL();const t=setInterval(fetchL,60000);return()=>clearInterval(t)},[]);
useEffect(()=>{const h=e=>{if(e.key==="Escape")setSel(null)};document.addEventListener("keydown",h);return()=>document.removeEventListener("keydown",h)},[]);
const gm=sel?data?.games?.find(g=>g.id===sel.gameId):null;const lc=Object.values(live).filter(g=>g.status?.abstractGameState==="Live").length;const fc=Object.values(live).filter(g=>g.status?.abstractGameState==="Final").length;const gen=data?.generatedAt?new Date(data.generatedAt):null;const age=gen?Math.round((Date.now()-gen.getTime())/60000):null;
return<><div className="min-h-screen bg-bg0 text-zinc-200"><header className="sticky top-0 z-40 bg-bg0/90 backdrop-blur-md border-b border-white/[.04]"><div className="max-w-7xl mx-auto px-4 py-2.5 flex items-center justify-between"><div className="flex items-center gap-2"><div className="w-2 h-2 rounded-full bg-emerald-400" style={{animation:"pulse2 2s infinite"}}/><span className="text-sm font-bold tracking-tight">MLB HRR</span></div><div className="flex items-center gap-3 text-[10px] text-zinc-500">{data&&<span className="hidden sm:inline">{data.date} · {data.games?.length} games{age!=null?` · ${age<60?age+"m":Math.floor(age/60)+"h"} ago`:""}</span>}<span className={`px-2 py-0.5 rounded-sm font-bold text-[9px] ${age&&age>720?"bg-amber-500/15 text-amber-400":"bg-emerald-500/15 text-emerald-400"}`}>{age&&age>720?"STALE":"LIVE"}</span><button onClick={()=>{setLoading(true);fetchD();fetchL()}} className="text-zinc-500 hover:text-zinc-300 transition">↻</button></div></div>
<div className="max-w-7xl mx-auto px-4 flex gap-0.5 overflow-x-auto pb-0 scrollbar-none">{TABS.map(t=>{const badge=t.id==="live"?(lc>0?lc+" LIVE":fc>0?fc+" F":null):t.id==="results"&&fc>0?fc:null;return<button key={t.id} onClick={()=>setTab(t.id)} className={`px-3 py-2 text-xs font-medium border-b-2 transition-all whitespace-nowrap ${tab===t.id?"border-zinc-200 text-zinc-100":"border-transparent text-zinc-500 hover:text-zinc-300"}`}>{t.l}{badge!=null&&<span className="text-[9px] bg-emerald-500/15 text-emerald-400 px-1.5 py-0.5 rounded font-bold ml-1.5">{badge}</span>}</button>})}</div></header>
<main className="max-w-7xl mx-auto px-4 py-4">{loading?<div className="flex flex-col items-center justify-center py-20 gap-3"><div className="w-6 h-6 border-2 border-zinc-700 border-t-zinc-400 rounded-full" style={{animation:"spin 0.7s linear infinite"}}/><span className="text-xs text-zinc-500">Loading...</span></div>:err?<div className="bg-red-500/10 border border-red-500/20 rounded-lg p-4 text-red-400 text-sm">{err}</div>:data&&<div style={{animation:"fadeUp 0.3s ease-out"}}>{tab==="top"&&<TopPlays data={data} onSelect={setSel}/>}{tab==="all"&&<AllPlayers data={data} onSelect={setSel}/>}{tab==="slate"&&<GameSlate data={data} onSelect={setSel}/>}{tab==="stacks"&&<Stacks data={data}/>}{tab==="history"&&<History data={data}/>}{tab==="live"&&<LiveScores live={live}/>}{tab==="results"&&<Results data={data} live={live}/>}</div>}</main></div>{sel&&<Modal player={sel} game={gm} onClose={()=>setSel(null)}/>}</>;
}
ReactDOM.render(<App/>,document.getElementById("root"));
</script>
</body>
</html>
